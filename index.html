<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>财经新闻速览 - 历史查看</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #000000;
            color: #ffffff;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px 0;
            border-bottom: 2px solid #333333;
        }
        
        .header h1 {
            font-size: 2.8em;
            margin-bottom: 15px;
            color: #ffffff;
            font-weight: 700;
            letter-spacing: 1px;
        }
        
        .header p {
            color: #cccccc;
            font-size: 1.1em;
            font-weight: 400;
        }
        
        /* 时间线 */
        .timeline {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 40px;
            flex-wrap: wrap;
            padding: 25px;
            background: #111111;
            border-radius: 12px;
            overflow-x: auto;
            border: 1px solid #333333;
        }
        
        .timeline-item {
            padding: 12px 18px;
            background: #1a1a1a;
            border: 2px solid #444444;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
            position: relative;
            color: #ffffff;
            font-weight: 500;
        }
        
        .timeline-item:hover {
            background: #2a2a2a;
            border-color: #666666;
            transform: translateY(-3px);
            box-shadow: 0 8px 16px rgba(255, 255, 255, 0.1);
        }
        
        .timeline-item.active {
            background: #ffffff;
            border-color: #ffffff;
            color: #000000;
            font-weight: 700;
            box-shadow: 0 8px 24px rgba(255, 255, 255, 0.2);
        }
        
        /* 控制按钮 */
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 12px 24px;
            background: #1a1a1a;
            border: 2px solid #ffffff;
            color: #ffffff;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1em;
            font-weight: 600;
        }
        
        .btn:hover:not(:disabled) {
            background: #ffffff;
            color: #000000;
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(255, 255, 255, 0.2);
        }
        
        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        
        /* 日期输入 */
        .date-input-group {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }
        
        .date-input-group input {
            padding: 12px 15px;
            background: #1a1a1a;
            border: 2px solid #444444;
            color: #ffffff;
            border-radius: 8px;
            font-size: 1em;
        }
        
        .date-input-group input::placeholder {
            color: #666666;
        }
        
        .date-input-group input:focus {
            outline: none;
            border-color: #ffffff;
            background: #1a1a1a;
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.2);
        }
        
        /* 新闻内容 */
        .news-container {
            background: #0a0a0a;
            border-radius: 12px;
            padding: 35px;
            border: 2px solid #333333;
        }
        
        .news-date {
            font-size: 1.5em;
            color: #ffffff;
            margin-bottom: 15px;
            font-weight: 700;
            letter-spacing: 1px;
        }
        
        .market-tone {
            color: #ffffff;
            margin-bottom: 25px;
            padding: 18px;
            background: #1a1a1a;
            border-left: 4px solid #ffffff;
            border-radius: 8px;
            font-weight: 500;
            font-size: 1.05em;
        }
        
        .news-section {
            margin-bottom: 35px;
        }
        
        .section-title {
            font-size: 1.3em;
            color: #ffffff;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 3px solid #ffffff;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        
        .news-item {
            background: #1a1a1a;
            padding: 20px;
            margin-bottom: 18px;
            border-radius: 10px;
            border: 2px solid #333333;
            border-left: 4px solid #ffffff;
            transition: all 0.3s ease;
        }
        
        .news-item:hover {
            background: #2a2a2a;
            border-color: #555555;
            box-shadow: 0 8px 16px rgba(255, 255, 255, 0.1);
            transform: translateX(4px);
        }
        
        .news-title {
            font-size: 1.2em;
            color: #ffffff;
            margin-bottom: 10px;
            font-weight: 700;
        }
        
        .news-summary {
            color: #dddddd;
            margin-bottom: 15px;
            line-height: 1.7;
            font-size: 1.02em;
        }
        
        .news-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            font-size: 0.95em;
            color: #aaaaaa;
        }
        
        .meta-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .meta-label {
            color: #888888;
            font-size: 0.9em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .meta-value {
            color: #ffffff;
            font-weight: 600;
            font-size: 1.05em;
        }
        
        .etf-list, .stock-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .etf-tag, .stock-tag {
            padding: 8px 14px;
            background: #2a2a2a;
            border: 2px solid #444444;
            border-radius: 6px;
            font-size: 0.95em;
            color: #ffffff;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        
        .etf-tag:hover, .stock-tag:hover {
            background: #3a3a3a;
            border-color: #666666;
            box-shadow: 0 4px 12px rgba(255, 255, 255, 0.1);
        }
        
        .sentiment-good {
            color: #ff6b6b;
            font-weight: 700;
        }
        
        .sentiment-bad {
            color: #51cf66;
            font-weight: 700;
        }
        
        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666666;
        }
        
        .empty-state p {
            font-size: 1.1em;
        }
        
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2em;
            }
            
            .news-container {
                padding: 20px;
            }
            
            .timeline {
                gap: 8px;
                padding: 15px;
            }
            
            .timeline-item {
                padding: 10px 12px;
                font-size: 0.9em;
            }
            
            .news-meta {
                gap: 15px;
            }
            
            .section-title {
                font-size: 1.1em;
            }
            
            .news-title {
                font-size: 1.05em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 财经新闻速览</h1>
            <p>实时财经新闻 · 历史查看 · 智能分类</p>
        </div>
        
        <div class="timeline" id="timeline"></div>
        
        <div class="controls">
            <button class="btn" id="prevBtn" onclick="showPreviousDate()">← 前一天</button>
            <button class="btn" id="todayBtn" onclick="showToday()">📅 今天</button>
            <button class="btn" id="nextBtn" onclick="showNextDate()">后一天 →</button>
            <button class="btn" onclick="toggleAllDates()">📋 查看所有日期</button>
        </div>
        
        <div class="date-input-group">
            <input type="text" id="dateInput" placeholder="输入日期 (YYYY-MM-DD)" onkeypress="handleDateInput(event)">
            <button class="btn" onclick="jumpToDate()">跳转</button>
        </div>
        
        <div class="news-container" id="newsContainer">
            <div class="empty-state">
                <p>加载中...</p>
            </div>
        </div>
    </div>
    
    <script src="news-data.js"></script>
    <script>
        let currentDate = availableDates[0];
        
        function initTimeline() {
            const timeline = document.getElementById('timeline');
            timeline.innerHTML = '';
            
            availableDates.forEach(date => {
                const item = document.createElement('div');
                item.className = 'timeline-item' + (date === currentDate ? ' active' : '');
                item.textContent = date;
                item.onclick = () => showDate(date);
                timeline.appendChild(item);
            });
        }
        
        function showDate(date) {
            if (!availableDates.includes(date)) return;
            currentDate = date;
            updateUI();
        }
        
        function showPreviousDate() {
            const prev = getPreviousDate(currentDate);
            if (prev) showDate(prev);
        }
        
        function showNextDate() {
            const next = getNextDate(currentDate);
            if (next) showDate(next);
        }
        
        function showToday() {
            showDate(availableDates[0]);
        }
        
        function jumpToDate() {
            const input = document.getElementById('dateInput').value;
            if (availableDates.includes(input)) {
                showDate(input);
                document.getElementById('dateInput').value = '';
            } else {
                alert('日期不存在');
            }
        }
        
        function handleDateInput(event) {
            if (event.key === 'Enter') {
                jumpToDate();
            }
        }
        
        function toggleAllDates() {
            const dates = availableDates.join('\n');
            alert('可用日期:\n' + dates);
        }
        
        function updateUI() {
            initTimeline();
            updateButtons();
            renderNews();
        }
        
        function updateButtons() {
            document.getElementById('prevBtn').disabled = !getPreviousDate(currentDate);
            document.getElementById('nextBtn').disabled = !getNextDate(currentDate);
        }
        
        function renderNews() {
            const news = getNews(currentDate);
            if (!news) {
                document.getElementById('newsContainer').innerHTML = '<div class="empty-state"><p>该日期暂无新闻</p></div>';
                return;
            }
            
            let html = `
                <div class="news-date">${news.date}</div>
                <div class="market-tone">📈 ${news.market_tone}</div>
            `;
            
            if (news.s_level && news.s_level.length > 0) {
                html += '<div class="news-section">';
                html += '<div class="section-title">🔴 S级新闻（主线级）</div>';
                news.s_level.forEach(item => {
                    html += renderNewsItem(item);
                });
                html += '</div>';
            }
            
            if (news.a_level && news.a_level.length > 0) {
                html += '<div class="news-section">';
                html += '<div class="section-title">🟡 A级新闻（轮动级）</div>';
                news.a_level.forEach(item => {
                    html += renderNewsItem(item);
                });
                html += '</div>';
            }
            
            if (news.douyin && news.douyin.length > 0) {
                html += '<div class="news-section">';
                html += '<div class="section-title">📱 抖音相关</div>';
                news.douyin.forEach(item => {
                    html += renderNewsItem(item);
                });
                html += '</div>';
            }
            
            document.getElementById('newsContainer').innerHTML = html;
        }
        
        function renderNewsItem(item) {
            let etfHtml = '';
            if (item.etfs && item.etfs.length > 0) {
                etfHtml = '<div class="meta-item"><span class="meta-label">📈 映射ETF</span><div class="etf-list">';
                item.etfs.forEach(etf => {
                    const sentiment = etf.sentiment === '利好' ? 'sentiment-good' : 'sentiment-bad';
                    etfHtml += `<span class="etf-tag"><span class="${sentiment}">${etf.sentiment}</span> ${etf.name}</span>`;
                });
                etfHtml += '</div></div>';
            }
            
            let stockHtml = '';
            if (item.stocks && item.stocks.length > 0) {
                stockHtml = '<div class="meta-item"><span class="meta-label">✨ 映射个股</span><div class="stock-list">';
                item.stocks.forEach(stock => {
                    stockHtml += `<span class="stock-tag">${stock}</span>`;
                });
                stockHtml += '</div></div>';
            }
            
            return `
                <div class="news-item">
                    <div class="news-title">${item.emoji} ${item.title}</div>
                    <div class="news-summary">${item.summary}</div>
                    <div class="news-meta">
                        <div class="meta-item">
                            <span class="meta-label">⏱️ 影响时长</span>
                            <span class="meta-value">${item.duration}</span>
                        </div>
                        ${etfHtml}
                        ${stockHtml}
                        <div class="meta-item">
                            <span class="meta-label">💡 资金信号</span>
                            <span class="meta-value">${item.signal}</span>
                        </div>
                    </div>
                </div>
            `;
        }
        
        // 初始化
        initTimeline();
        updateButtons();
        renderNews();
    </script>
</body>
</html>
