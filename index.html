<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>财经新闻速览 - 历史查看</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* 头部 */
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .header h1 {
            color: #4CAF50;
            font-size: 28px;
            margin-bottom: 10px;
        }
        .header p {
            color: #888;
            font-size: 14px;
        }

        /* 时间线 */
        .timeline {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }
        .timeline-item {
            padding: 8px 14px;
            background: rgba(76,175,80,0.1);
            border: 2px solid rgba(76,175,80,0.3);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            white-space: nowrap;
        }
        .timeline-item:hover {
            background: rgba(76,175,80,0.2);
            border-color: rgba(76,175,80,0.6);
            transform: translateY(-2px);
        }
        .timeline-item.active {
            background: rgba(76,175,80,0.3);
            border-color: #4CAF50;
            color: #4CAF50;
            font-weight: bold;
        }

        /* 控制按钮 */
        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 8px 16px;
            background: rgba(76,175,80,0.2);
            border: 2px solid rgba(76,175,80,0.5);
            color: #4CAF50;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }
        .btn:hover:not(:disabled) {
            background: rgba(76,175,80,0.3);
            border-color: #4CAF50;
            transform: translateY(-2px);
        }
        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* 日期输入 */
        .date-input-group {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
        }
        .date-input-group input {
            padding: 8px 14px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(76,175,80,0.3);
            color: #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }
        .date-input-group input:focus {
            outline: none;
            border-color: #4CAF50;
            background: rgba(76,175,80,0.1);
        }

        /* 市场基调 - 重要提示 */
        .market-tone {
            background: rgba(255,193,7,0.1);
            border-left: 4px solid #FFC107;
            padding: 15px;
            margin-bottom: 25px;
            border-radius: 8px;
        }
        .market-tone strong {
            color: #FFC107;
        }

        /* 新闻区块 */
        .news-section {
            margin-bottom: 30px;
        }
        .section-title {
            font-size: 20px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid;
        }
        .s-level .section-title { color: #f44336; border-color: #f44336; }
        .a-level .section-title { color: #FFC107; border-color: #FFC107; }
        .douyin .section-title { color: #2196F3; border-color: #2196F3; }

        /* 新闻卡片 */
        .news-item {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s;
        }
        .news-item:hover {
            background: rgba(255,255,255,0.08);
            transform: translateX(5px);
        }
        .news-title {
            font-size: 17px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #fff;
        }
        .news-row {
            margin: 7px 0;
            font-size: 14px;
            line-height: 1.6;
        }
        .label {
            color: #888;
            margin-right: 8px;
        }
        .bullish { color: #f44336; }
        .bearish { color: #4CAF50; }

        /* 标签 */
        .etf-tag {
            display: inline-block;
            background: rgba(76,175,80,0.2);
            color: #4CAF50;
            padding: 3px 10px;
            border-radius: 12px;
            margin: 3px;
            font-size: 12px;
        }
        .stock-tag {
            display: inline-block;
            background: rgba(33,150,243,0.2);
            color: #2196F3;
            padding: 3px 10px;
            border-radius: 12px;
            margin: 3px;
            font-size: 12px;
        }

        /* Footer */
        footer {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            color: #666;
            font-size: 12px;
        }

        @media (max-width: 768px) {
            .header h1 { font-size: 22px; }
            .timeline { gap: 6px; }
            .timeline-item { padding: 6px 10px; font-size: 12px; }
            .news-item { padding: 15px; }
            .news-title { font-size: 15px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 财经新闻速览</h1>
            <p>实时财经新闻 · 历史查看 · 智能分类</p>
        </div>

        <div class="timeline" id="timeline"></div>

        <div class="controls">
            <button class="btn" id="prevBtn" onclick="showPreviousDate()">← 前一天</button>
            <button class="btn" id="todayBtn" onclick="showToday()">📅 今天</button>
            <button class="btn" id="nextBtn" onclick="showNextDate()">后一天 →</button>
            <button class="btn" onclick="showAllDates()">📋 所有日期</button>
        </div>

        <div class="date-input-group">
            <input type="text" id="dateInput" placeholder="输入日期 (YYYY-MM-DD)" onkeypress="handleDateInput(event)">
            <button class="btn" onclick="jumpToDate()">跳转</button>
        </div>

        <div id="newsContent"></div>

        <footer>
            <p>数据来源：网易财经 · 权威财经媒体</p>
        </footer>
    </div>

    <script src="news-data.js"></script>
    <script>
        let currentDate = availableDates[0];

        function initTimeline() {
            const timeline = document.getElementById('timeline');
            timeline.innerHTML = '';
            availableDates.forEach(date => {
                const item = document.createElement('div');
                item.className = 'timeline-item' + (date === currentDate ? ' active' : '');
                item.textContent = date;
                item.onclick = () => showDate(date);
                timeline.appendChild(item);
            });
        }

        function showDate(date) {
            if (!availableDates.includes(date)) return;
            currentDate = date;
            updateUI();
        }

        function showPreviousDate() {
            const idx = availableDates.indexOf(currentDate);
            if (idx < availableDates.length - 1) showDate(availableDates[idx + 1]);
        }

        function showNextDate() {
            const idx = availableDates.indexOf(currentDate);
            if (idx > 0) showDate(availableDates[idx - 1]);
        }

        function showToday() {
            showDate(availableDates[0]);
        }

        function getPreviousDate(date) {
            const idx = availableDates.indexOf(date);
            return idx < availableDates.length - 1 ? availableDates[idx + 1] : null;
        }

        function getNextDate(date) {
            const idx = availableDates.indexOf(date);
            return idx > 0 ? availableDates[idx - 1] : null;
        }

        function jumpToDate() {
            const input = document.getElementById('dateInput').value.trim();
            if (availableDates.includes(input)) {
                showDate(input);
                document.getElementById('dateInput').value = '';
            }
        }

        function handleDateInput(event) {
            if (event.key === 'Enter') jumpToDate();
        }

        function showAllDates() {
            const dates = availableDates.join('\n');
            alert('可用日期:\n' + dates);
        }

        function updateUI() {
            initTimeline();
            updateButtons();
            renderNews();
        }

        function updateButtons() {
            document.getElementById('prevBtn').disabled = !getPreviousDate(currentDate);
            document.getElementById('nextBtn').disabled = !getNextDate(currentDate);
        }

        function renderNews() {
            const news = newsData[currentDate];
            if (!news) {
                document.getElementById('newsContent').innerHTML = '<p style="text-align:center;color:#888;">该日期暂无新闻</p>';
                return;
            }

            let html = `<div class="market-tone"><strong>⚠️ 今日市场基调：</strong>${news.market_tone}</div>`;

            if (news.s_level && news.s_level.length > 0) {
                html += '<div class="news-section s-level">';
                html += '<div class="section-title">🔴 S级 - 主线级</div>';
                news.s_level.forEach(item => { html += renderNewsItem(item); });
                html += '</div>';
            }

            if (news.a_level && news.a_level.length > 0) {
                html += '<div class="news-section a-level">';
                html += '<div class="section-title">🟡 A级 - 轮动级</div>';
                news.a_level.forEach(item => { html += renderNewsItem(item); });
                html += '</div>';
            }

            if (news.douyin && news.douyin.length > 0) {
                html += '<div class="news-section douyin">';
                html += '<div class="section-title">📱 抖音相关</div>';
                news.douyin.forEach(item => { html += renderNewsItem(item); });
                html += '</div>';
            }

            document.getElementById('newsContent').innerHTML = html;
        }

        function renderNewsItem(item) {
            let etfHtml = '';
            if (item.etfs && item.etfs.length > 0) {
                etfHtml = '<div class="news-row"><span class="label">📈 映射ETF：</span>';
                item.etfs.forEach(etf => {
                    const cls = etf.sentiment === '利好' ? 'bullish' : 'bearish';
                    const txt = etf.sentiment === '利好' ? '利好' : '利空';
                    etfHtml += `<span class="etf-tag"><span class="${cls}">${txt}</span> ${etf.name}</span>`;
                });
                etfHtml += '</div>';
            }

            let stockHtml = '';
            if (item.stocks && item.stocks.length > 0) {
                stockHtml = '<div class="news-row"><span class="label">✨ 映射个股：</span>';
                item.stocks.forEach(stock => {
                    stockHtml += `<span class="stock-tag">${stock}</span>`;
                });
                stockHtml += '</div>';
            }

            return `
                <div class="news-item">
                    <div class="news-title">${item.emoji} ${item.title}</div>
                    <div class="news-row"><span class="label">📌 要点：</span>${item.summary}</div>
                    <div class="news-row"><span class="label">⏱️ 影响时长：</span>${item.duration}</div>
                    ${etfHtml}
                    ${stockHtml}
                    <div class="news-row"><span class="label">💡 资金信号：</span>${item.signal}</div>
                </div>
            `;
        }

        // 初始化
        updateUI();
    </script>
</body>
</html>
