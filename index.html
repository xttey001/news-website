<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>财经新闻速览 - 历史查看</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        h1 {
            color: #4CAF50;
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .date-selector {
            display: flex;
            gap: 10px;
            justify-content: center;
            align-items: center;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        
        .date-selector button {
            background: rgba(76,175,80,0.2);
            color: #4CAF50;
            border: 1px solid #4CAF50;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }
        
        .date-selector button:hover {
            background: rgba(76,175,80,0.4);
        }
        
        .date-selector button.active {
            background: #4CAF50;
            color: #1a1a2e;
        }
        
        .date-selector input {
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: #e0e0e0;
            font-size: 14px;
        }
        
        .timeline {
            display: flex;
            gap: 5px;
            overflow-x: auto;
            padding: 15px 0;
            margin: 20px 0;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .timeline-item {
            min-width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 12px;
            text-align: center;
            padding: 5px;
        }
        
        .timeline-item:hover {
            background: rgba(76,175,80,0.2);
            border-color: #4CAF50;
        }
        
        .timeline-item.active {
            background: #4CAF50;
            color: #1a1a2e;
            border-color: #4CAF50;
        }
        
        .market-tone {
            background: rgba(255,193,7,0.1);
            border-left: 4px solid #FFC107;
            padding: 15px;
            margin: 20px 0;
            border-radius: 8px;
        }
        
        .market-tone strong {
            color: #FFC107;
        }
        
        .section {
            margin: 30px 0;
        }
        
        .section-title {
            font-size: 22px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid;
        }
        
        .s-level .section-title { color: #f44336; border-color: #f44336; }
        .a-level .section-title { color: #FFC107; border-color: #FFC107; }
        .douyin .section-title { color: #2196F3; border-color: #2196F3; }
        
        .news-item {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            margin: 15px 0;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s;
        }
        
        .news-item:hover {
            background: rgba(255,255,255,0.08);
            transform: translateX(5px);
        }
        
        .news-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 12px;
            color: #fff;
        }
        
        .news-row {
            margin: 8px 0;
            font-size: 14px;
        }
        
        .label {
            color: #888;
            margin-right: 8px;
        }
        
        .etf-tag {
            display: inline-block;
            background: rgba(76,175,80,0.2);
            color: #4CAF50;
            padding: 3px 10px;
            border-radius: 12px;
            margin: 3px;
            font-size: 12px;
        }
        
        .stock-tag {
            display: inline-block;
            background: rgba(33,150,243,0.2);
            color: #2196F3;
            padding: 3px 10px;
            border-radius: 12px;
            margin: 3px;
            font-size: 12px;
        }
        
        .sentiment-bullish {
            color: #f44336;
        }
        
        .sentiment-bearish {
            color: #4CAF50;
        }
        
        footer {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            color: #666;
            font-size: 12px;
        }
        
        .nav-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
        }
        
        .nav-buttons button {
            background: rgba(76,175,80,0.2);
            color: #4CAF50;
            border: 1px solid #4CAF50;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .nav-buttons button:hover:not(:disabled) {
            background: rgba(76,175,80,0.4);
        }
        
        .nav-buttons button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        
        .current-date {
            text-align: center;
            font-size: 18px;
            color: #4CAF50;
            margin: 20px 0;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 财经新闻速览</h1>
            <p>支持历史新闻查看</p>
        </header>

        <div class="date-selector">
            <button onclick="goToToday()">今天</button>
            <input type="date" id="dateInput" onchange="loadNewsFromInput()">
            <button onclick="showAllDates()">查看所有日期</button>
        </div>

        <div class="timeline" id="timeline"></div>

        <div class="nav-buttons">
            <button onclick="previousDay()" id="prevBtn">← 前一天</button>
            <button onclick="nextDay()" id="nextBtn">后一天 →</button>
        </div>

        <div class="current-date" id="currentDate"></div>

        <div class="market-tone" id="marketTone"></div>

        <div class="section s-level" id="sLevel"></div>
        <div class="section a-level" id="aLevel"></div>
        <div class="section douyin" id="douyin"></div>

        <footer>
            <p>生成时间：<span id="generatedTime"></span></p>
            <p>数据来源：网易财经、权威财经媒体</p>
        </footer>
    </div>

    <script src="news-data.js"></script>
    <script>
        let currentDate = availableDates[0]; // 默认显示今天

        function formatDate(dateStr) {
            const date = new Date(dateStr + 'T00:00:00');
            const days = ['日', '一', '二', '三', '四', '五', '六'];
            const day = days[date.getDay()];
            return dateStr.split('-').slice(1).join('-') + ' (周' + day + ')';
        }

        function renderTimeline() {
            const timeline = document.getElementById('timeline');
            timeline.innerHTML = '';
            
            availableDates.forEach(date => {
                const item = document.createElement('div');
                item.className = 'timeline-item' + (date === currentDate ? ' active' : '');
                item.textContent = date.split('-')[2];
                item.onclick = () => loadNews(date);
                timeline.appendChild(item);
            });
        }

        function renderNews(date) {
            const news = getNews(date);
            if (!news) return;

            // 更新当前日期显示
            document.getElementById('currentDate').textContent = '📅 ' + formatDate(date);

            // 更新市场基调
            document.getElementById('marketTone').innerHTML = 
                '<strong>⚠️ 今日市场总基调：</strong>' + news.market_tone;

            // 渲染 S 级新闻
            let sHtml = '<h2 class="section-title">🔴 S级 - 主线级</h2>';
            news.s_level.forEach(item => {
                const etfHtml = item.etfs.map(e => 
                    `<span class="etf-tag">${e.name}(<span class="sentiment-${e.sentiment === '利好' ? 'bullish' : 'bearish'}">${e.sentiment}</span>)</span>`
                ).join('');
                const stockHtml = item.stocks.map(s => 
                    `<span class="stock-tag">${s}</span>`
                ).join('');
                
                sHtml += `
                    <div class="news-item">
                        <div class="news-title">${item.emoji} ${item.title}</div>
                        <div class="news-row"><span class="label">📌 要点：</span>${item.summary}</div>
                        <div class="news-row"><span class="label">⏱️ 影响时长：</span>${item.duration}</div>
                        <div class="news-row"><span class="label">📈 映射ETF：</span>${etfHtml}</div>
                        <div class="news-row"><span class="label">✨ 映射个股：</span>${stockHtml}</div>
                        <div class="news-row"><span class="label">💡 资金信号：</span>${item.signal}</div>
                    </div>
                `;
            });
            document.getElementById('sLevel').innerHTML = sHtml;

            // 渲染 A 级新闻
            let aHtml = '<h2 class="section-title">🟡 A级 - 轮动级</h2>';
            news.a_level.forEach(item => {
                const etfHtml = item.etfs.map(e => 
                    `<span class="etf-tag">${e.name}(<span class="sentiment-${e.sentiment === '利好' ? 'bullish' : 'bearish'}">${e.sentiment}</span>)</span>`
                ).join('');
                const stockHtml = item.stocks.map(s => 
                    `<span class="stock-tag">${s}</span>`
                ).join('');
                
                aHtml += `
                    <div class="news-item">
                        <div class="news-title">${item.emoji} ${item.title}</div>
                        <div class="news-row"><span class="label">📌 要点：</span>${item.summary}</div>
                        <div class="news-row"><span class="label">⏱️ 影响时长：</span>${item.duration}</div>
                        <div class="news-row"><span class="label">📈 映射ETF：</span>${etfHtml}</div>
                        <div class="news-row"><span class="label">✨ 映射个股：</span>${stockHtml}</div>
                        <div class="news-row"><span class="label">💡 资金信号：</span>${item.signal}</div>
                    </div>
                `;
            });
            document.getElementById('aLevel').innerHTML = aHtml;

            // 渲染抖音相关
            let dyHtml = '<h2 class="section-title">📱 抖音相关</h2>';
            news.douyin.forEach(item => {
                const etfHtml = item.etfs.map(e => 
                    `<span class="etf-tag">${e.name}(<span class="sentiment-${e.sentiment === '利好' ? 'bullish' : 'bearish'}">${e.sentiment}</span>)</span>`
                ).join('');
                const stockHtml = item.stocks.map(s => 
                    `<span class="stock-tag">${s}</span>`
                ).join('');
                
                dyHtml += `
                    <div class="news-item">
                        <div class="news-title">${item.emoji} ${item.title}</div>
                        <div class="news-row"><span class="label">📌 要点：</span>${item.summary}</div>
                        <div class="news-row"><span class="label">⏱️ 影响时长：</span>${item.duration}</div>
                        <div class="news-row"><span class="label">📈 映射ETF：</span>${etfHtml}</div>
                        <div class="news-row"><span class="label">✨ 映射个股：</span>${stockHtml}</div>
                        <div class="news-row"><span class="label">💡 资金信号：</span>${item.signal}</div>
                    </div>
                `;
            });
            document.getElementById('douyin').innerHTML = dyHtml;

            // 更新导航按钮
            document.getElementById('prevBtn').disabled = !getPreviousDate(date);
            document.getElementById('nextBtn').disabled = !getNextDate(date);

            // 更新时间线
            renderTimeline();

            // 更新日期输入框
            document.getElementById('dateInput').value = date;

            // 更新生成时间
            document.getElementById('generatedTime').textContent = new Date().toLocaleString('zh-CN');
        }

        function loadNews(date) {
            if (availableDates.includes(date)) {
                currentDate = date;
                renderNews(date);
                window.scrollTo(0, 0);
            }
        }

        function previousDay() {
            const prev = getPreviousDate(currentDate);
            if (prev) loadNews(prev);
        }

        function nextDay() {
            const next = getNextDate(currentDate);
            if (next) loadNews(next);
        }

        function goToToday() {
            loadNews(availableDates[0]);
        }

        function loadNewsFromInput() {
            const date = document.getElementById('dateInput').value;
            loadNews(date);
        }

        function showAllDates() {
            alert('可用日期：\n' + availableDates.join('\n'));
        }

        // 初始化
        renderNews(currentDate);
    </script>
</body>
</html>
