<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>悟空财经分析</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-start: #0d1117;
            --bg-end: #161b22;
            --green: #3fb950;
            --green-bg: rgba(63,185,80,0.12);
            --orange: #f0883e;
            --red: #f85149;
            --blue: #58a6ff;
            --gold: #d29922;
            --purple: #a371f7;
            --card-bg: rgba(255,255,255,0.04);
            --card-border: rgba(255,255,255,0.1);
            --text: #e6edf3;
            --text-dim: #8b949e;
            --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            font-family: var(--font);
            background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
            line-height: 1.7;
        }
        .container { max-width: 900px; margin: 0 auto; }

        /* ===== 标题 ===== */
        .header {
            text-align: center;
            margin-bottom: 32px;
            padding: 24px;
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px solid var(--card-border);
        }
        .header h1 {
            font-size: 26px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--green) 0%, var(--blue) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header .date-tag {
            display: inline-block;
            margin-top: 10px;
            padding: 6px 14px;
            background: rgba(163,113,247,0.15);
            border: 1px solid rgba(163,113,247,0.3);
            border-radius: 8px;
            color: var(--purple);
            font-size: 13px;
        }

        /* ===== 导航 ===== */
        .nav-bar {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 28px;
            flex-wrap: wrap;
            padding: 14px;
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--card-border);
        }
        .date-btn {
            padding: 8px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 13px;
            color: var(--text-dim);
        }
        .date-btn:hover {
            background: rgba(63,185,80,0.1);
            border-color: var(--green);
            color: var(--green);
        }
        .date-btn.active {
            background: var(--green-bg);
            border-color: var(--green);
            color: var(--green);
            font-weight: 600;
        }

        /* ===== 区块通用 ===== */
        .section {
            background: var(--card-bg);
            border-radius: 14px;
            border: 1px solid var(--card-border);
            padding: 22px;
            margin-bottom: 24px;
        }
        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        /* ===== 今日基调 ===== */
        .tone-section .section-title { color: var(--gold); }
        .tone-content {
            font-size: 15px;
            line-height: 1.8;
            color: var(--text);
        }

        /* ===== 悟空判断 ===== */
        .judgment-section { 
            background: linear-gradient(135deg, rgba(163,113,247,0.08) 0%, rgba(88,166,255,0.05) 100%);
            border-color: rgba(163,113,247,0.2);
        }
        .judgment-section .section-title { color: var(--purple); }
        .emotion-row {
            font-size: 14px;
            margin-bottom: 14px;
            padding-bottom: 14px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .emotion-label { color: var(--text-dim); }
        .emotion-value { 
            color: var(--green); 
            font-weight: 600;
        }
        .analysis-list {
            margin-bottom: 16px;
        }
        .analysis-item {
            position: relative;
            padding-left: 18px;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .analysis-item::before {
            content: '•';
            position: absolute;
            left: 0;
            color: var(--text-dim);
        }
        .strategy-box {
            background: rgba(255,255,255,0.04);
            border-radius: 10px;
            padding: 16px;
        }
        .strategy-label {
            font-size: 13px;
            color: var(--text-dim);
            margin-bottom: 10px;
        }
        .strategy-item {
            font-size: 14px;
            margin-bottom: 8px;
            line-height: 1.6;
        }

        /* ===== 新闻区块 ===== */
        .news-section.s-level .section-title { color: var(--red); }
        .news-section.a-level .section-title { color: var(--gold); }
        .news-section.douyin .section-title { color: var(--blue); }

        /* ===== 新闻卡片 ===== */
        .news-card {
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            border-left: 4px solid;
            padding: 18px;
            margin-bottom: 16px;
        }
        .s-level .news-card { border-left-color: var(--red); }
        .a-level .news-card { border-left-color: var(--gold); }
        .douyin .news-card { border-left-color: var(--blue); }

        .news-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 12px;
        }
        .news-title {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            flex: 1;
        }
        .news-source {
            padding: 4px 10px;
            background: rgba(255,255,255,0.06);
            border-radius: 6px;
            font-size: 11px;
            color: var(--text-dim);
        }
        .news-row {
            margin: 10px 0;
            font-size: 14px;
        }
        .label { 
            color: var(--text-dim); 
            margin-right: 6px;
            font-size: 13px;
        }

        /* ===== 映射标签 ===== */
        .mapping-section {
            margin-top: 14px;
        }
        .mapping-row {
            margin-bottom: 12px;
        }
        .mapping-label {
            font-size: 13px;
            color: var(--text-dim);
            margin-bottom: 8px;
        }
        .tags-wrap {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .tag-item {
            display: inline-flex;
            align-items: center;
            gap: 0;
            padding: 0;
            border-radius: 6px;
            overflow: hidden;
            font-size: 12px;
            border: 1px solid rgba(255,255,255,0.15);
            transition: all 0.2s;
        }
        .tag-item:hover {
            transform: translateY(-1px);
            border-color: rgba(255,255,255,0.3);
        }
        .tag-sentiment {
            padding: 5px 8px;
            font-weight: 700;
            font-size: 11px;
        }
        .tag-sentiment.bullish { background: var(--red); color: #fff; }
        .tag-sentiment.bearish { background: var(--green); color: #fff; }
        .tag-sentiment.neutral { background: #6e7681; color: #fff; }
        .tag-sentiment.watch { background: var(--blue); color: #fff; }
        .tag-sentiment.avoid { background: var(--orange); color: #fff; }
        .tag-name {
            padding: 5px 10px;
            color: var(--text);
        }
        .tag-note {
            padding: 5px 8px;
            color: var(--text-dim);
            font-size: 11px;
            background: rgba(255,255,255,0.03);
        }

        /* ===== 警告提示 ===== */
        .warning-box {
            margin-top: 14px;
            padding: 12px 14px;
            background: rgba(248,129,73,0.1);
            border: 1px solid rgba(248,129,73,0.25);
            border-radius: 8px;
            font-size: 13px;
            color: var(--orange);
        }

        /* ===== Footer ===== */
        footer {
            text-align: center;
            margin-top: 48px;
            padding: 24px;
            color: #484f58;
            font-size: 12px;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 768px) {
            .header h1 { font-size: 22px; }
            .section { padding: 16px; }
            .news-card { padding: 14px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🐵 悟空财经分析</h1>
            <div class="date-tag" id="dateDisplay"></div>
        </div>

        <!-- 日期导航 -->
        <div class="nav-bar" id="navBar"></div>

        <!-- 内容区 -->
        <div id="content"></div>

        <footer>
            <p>数据来源：天集 ProSearch · 权威财经媒体</p>
        </footer>
    </div>

    <script src="news-data.js"></script>
    <script>
        let currentDate = availableDates[0];

        function formatDate(dateStr) {
            const [y, m, d] = dateStr.split('-');
            return `${parseInt(m)}月${parseInt(d)}日`;
        }

        function initNav() {
            const nav = document.getElementById('navBar');
            nav.innerHTML = '';
            availableDates.forEach(date => {
                const btn = document.createElement('button');
                btn.className = 'date-btn' + (date === currentDate ? ' active' : '');
                btn.textContent = formatDate(date);
                btn.onclick = () => { currentDate = date; updateUI(); };
                nav.appendChild(btn);
            });
        }

        function updateUI() {
            // 更新导航高亮
            document.querySelectorAll('.date-btn').forEach((btn, i) => {
                btn.classList.toggle('active', availableDates[i] === currentDate);
            });
            // 更新日期显示
            document.getElementById('dateDisplay').textContent = formatDate(currentDate);
            renderContent();
        }

        function getSentimentClass(sentiment) {
            const map = {
                '利好': 'bullish',
                '利空': 'bearish',
                '关注': 'watch',
                '警惕': 'avoid',
                '回避': 'avoid'
            };
            return map[sentiment] || 'neutral';
        }

        function renderTags(items) {
            if (!items || !items.length) return '';
            let html = '<div class="tags-wrap">';
            items.forEach(item => {
                const cls = getSentimentClass(item.sentiment);
                html += `<span class="tag-item">`;
                html += `<span class="tag-sentiment ${cls}">${item.sentiment}</span>`;
                html += `<span class="tag-name">${item.name}</span>`;
                if (item.note) {
                    html += `<span class="tag-note">${item.note}</span>`;
                }
                html += '</span>';
            });
            html += '</div>';
            return html;
        }

        function renderNewsCard(item) {
            let html = `
                <div class="news-card">
                    <div class="news-header">
                        <div class="news-title">${item.emoji} ${item.title}</div>
                        <div class="news-source">来源：${item.source}</div>
                    </div>
                    <div class="news-row"><span class="label">要点：</span>${item.summary}</div>
                    <div class="news-row"><span class="label">影响时长：</span>${item.duration}</div>`;

            if (item.etfs && item.etfs.length) {
                html += `
                    <div class="mapping-section">
                        <div class="mapping-row">
                            <div class="mapping-label">📈 ETF映射：</div>
                            ${renderTags(item.etfs)}
                        </div>
                    </div>`;
            }

            if (item.stocks && item.stocks.length) {
                html += `
                    <div class="mapping-section">
                        <div class="mapping-row">
                            <div class="mapping-label">✨ 个股映射：</div>
                            ${renderTags(item.stocks)}
                        </div>
                    </div>`;
            }

            if (item.warning) {
                html += `<div class="warning-box">⚠️ ${item.warning}</div>`;
            }

            html += '</div>';
            return html;
        }

        function renderContent() {
            const data = newsData[currentDate];
            if (!data) {
                document.getElementById('content').innerHTML = '<p style="text-align:center;color:#666;padding:60px;">该日期暂无数据</p>';
                return;
            }

            let html = '';

            // 今日基调
            if (data.market_tone) {
                html += `
                    <div class="section tone-section">
                        <div class="section-title">📊 今日基调</div>
                        <div class="tone-content">${data.market_tone}</div>
                    </div>`;
            }

            // 悟空今日判断
            if (data.wukong_judgment) {
                const wj = data.wukong_judgment;
                html += `
                    <div class="section judgment-section">
                        <div class="section-title">📈 悟空今日判断</div>`;
                
                if (wj.emotion) {
                    html += `
                        <div class="emotion-row">
                            <span class="emotion-label">大盘情绪：</span>
                            <span class="emotion-value">${wj.emotion}</span>
                        </div>`;
                }

                if (wj.analysis && wj.analysis.length) {
                    html += '<div class="analysis-list">';
                    wj.analysis.forEach(a => {
                        html += `<div class="analysis-item">${a}</div>`;
                    });
                    html += '</div>';
                }

                if (wj.strategy && wj.strategy.length) {
                    html += `
                        <div class="strategy-box">
                            <div class="strategy-label">今日操作参考：</div>`;
                    wj.strategy.forEach(s => {
                        html += `<div class="strategy-item">${s}</div>`;
                    });
                    html += '</div>';
                }

                html += '</div>';
            }

            // S级
            if (data.s_level && data.s_level.length) {
                html += `
                    <div class="section news-section s-level">
                        <div class="section-title">🔴 S级（结构性叙事，影响1-4周）</div>`;
                data.s_level.forEach(item => {
                    html += renderNewsCard(item);
                });
                html += '</div>';
            }

            // A级
            if (data.a_level && data.a_level.length) {
                html += `
                    <div class="section news-section a-level">
                        <div class="section-title">🟡 A级（阶段性叙事，影响1-3天）</div>`;
                data.a_level.forEach(item => {
                    html += renderNewsCard(item);
                });
                html += '</div>';
            }

            // 抖音/平台
            if (data.douyin && data.douyin.length) {
                html += `
                    <div class="section news-section douyin">
                        <div class="section-title">📱 抖音/平台相关</div>`;
                data.douyin.forEach(item => {
                    html += renderNewsCard(item);
                });
                html += '</div>';
            }

            document.getElementById('content').innerHTML = html;
        }

        // 初始化
        initNav();
        updateUI();
    </script>
</body>
</html>
