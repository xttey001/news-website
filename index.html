<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>悟空财经判断</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-start: #0d1117;
            --bg-end: #161b22;
            --green: #3fb950;
            --green-bg: rgba(63,185,80,0.12);
            --green-border: rgba(63,185,80,0.35);
            --orange: #f0883e;
            --red: #f85149;
            --blue: #58a6ff;
            --gold: #d29922;
            --purple: #a371f7;
            --card-bg: rgba(255,255,255,0.04);
            --card-border: rgba(255,255,255,0.1);
            --text: #e6edf3;
            --text-dim: #8b949e;
            --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            font-family: var(--font);
            background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1000px; margin: 0 auto; }

        /* ===== 头部 ===== */
        .header {
            text-align: center;
            margin-bottom: 32px;
            padding: 28px;
            background: var(--card-bg);
            border-radius: 20px;
            border: 1px solid var(--card-border);
        }
        .header h1 { 
            font-size: 32px; 
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--green) 0%, var(--blue) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header .subtitle { 
            color: var(--text-dim); 
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .header .date-display {
            margin-top: 12px;
            padding: 8px 16px;
            background: rgba(63,185,80,0.1);
            border-radius: 8px;
            display: inline-block;
            color: var(--green);
            font-weight: 600;
        }

        /* ===== 时间线 ===== */
        .timeline-nav {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 28px;
            flex-wrap: wrap;
            padding: 16px;
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--card-border);
        }
        .date-item {
            padding: 8px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 13px;
        }
        .date-item:hover {
            background: rgba(63,185,80,0.1);
            border-color: var(--green);
            transform: translateY(-2px);
        }
        .date-item.active {
            background: var(--green-bg);
            border-color: var(--green);
            color: var(--green);
            font-weight: 600;
            box-shadow: 0 0 16px rgba(63,185,80,0.2);
        }

        /* ===== 控制按钮 ===== */
        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 8px 18px;
            background: var(--green-bg);
            border: 1px solid var(--green-border);
            color: var(--green);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }
        .btn:hover:not(:disabled) {
            background: rgba(63,185,80,0.2);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(63,185,80,0.15);
        }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }

        /* ===== 市场基调 ===== */
        .market-tone {
            background: linear-gradient(135deg, rgba(210,153,34,0.12) 0%, rgba(210,153,34,0.05) 100%);
            border-left: 4px solid var(--gold);
            padding: 18px 22px;
            margin-bottom: 20px;
            border-radius: 0 12px 12px 0;
        }
        .market-tone h2 {
            color: var(--gold);
            font-size: 16px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .market-tone p { color: var(--text); line-height: 1.7; }

        /* ===== 悟空判断 ===== */
        .wukong-judgment {
            background: linear-gradient(135deg, rgba(163,113,247,0.12) 0%, rgba(88,166,255,0.08) 100%);
            border: 1px solid rgba(163,113,247,0.25);
            padding: 22px;
            margin-bottom: 28px;
            border-radius: 16px;
        }
        .wukong-judgment h2 {
            color: var(--purple);
            font-size: 18px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .wukong-judgment .summary {
            font-size: 15px;
            line-height: 1.7;
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .wukong-judgment .tags-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 14px;
        }
        .wukong-judgment .tag-group {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .wukong-judgment .tag-label {
            font-size: 12px;
            color: var(--text-dim);
        }
        .wukong-judgment .bullish-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }
        .wukong-judgment .bullish-tag {
            padding: 4px 10px;
            background: rgba(248,81,73,0.15);
            border: 1px solid rgba(248,81,73,0.3);
            border-radius: 6px;
            font-size: 12px;
            color: #ff7b72;
        }
        .wukong-judgment .bearish-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }
        .wukong-judgment .bearish-tag {
            padding: 4px 10px;
            background: rgba(63,185,80,0.15);
            border: 1px solid rgba(63,185,80,0.3);
            border-radius: 6px;
            font-size: 12px;
            color: var(--green);
        }
        .wukong-judgment .strategy {
            margin-top: 14px;
            padding: 14px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            font-size: 14px;
            line-height: 1.6;
        }
        .wukong-judgment .strategy-label {
            color: var(--text-dim);
            font-size: 12px;
            margin-bottom: 6px;
        }

        /* ===== 新闻区块 ===== */
        .news-section { margin-bottom: 32px; }
        .section-title {
            font-size: 20px;
            margin-bottom: 18px;
            padding-bottom: 10px;
            border-bottom: 2px solid;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .s-level .section-title { color: var(--red); border-color: var(--red); }
        .a-level .section-title { color: var(--gold); border-color: var(--gold); }
        .douyin .section-title { color: var(--blue); border-color: var(--blue); }

        /* ===== 新闻卡片 ===== */
        .news-item {
            background: var(--card-bg);
            padding: 22px;
            margin-bottom: 16px;
            border-radius: 14px;
            border: 1px solid var(--card-border);
            transition: all 0.3s;
            border-left: 4px solid transparent;
        }
        .news-item:hover {
            background: rgba(255,255,255,0.06);
            transform: translateX(4px);
        }
        .s-level .news-item { border-left-color: var(--red); }
        .a-level .news-item { border-left-color: var(--gold); }
        .douyin .news-item { border-left-color: var(--blue); }

        .news-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .news-title {
            font-size: 17px;
            font-weight: 600;
            color: #fff;
            line-height: 1.5;
            flex: 1;
        }
        .news-source {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            background: rgba(255,255,255,0.06);
            border-radius: 6px;
            font-size: 11px;
            color: var(--text-dim);
        }
        .news-source a {
            color: var(--blue);
            text-decoration: none;
        }
        .news-source a:hover {
            text-decoration: underline;
        }

        .news-row {
            margin: 10px 0;
            font-size: 14px;
            line-height: 1.7;
        }
        .label { color: var(--text-dim); margin-right: 8px; }

        /* ===== 标签样式 ===== */
        .tag-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }

        .etf-tag {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 12px;
            border-radius: 8px;
            margin: 3px;
            font-size: 12px;
            border: 1px solid;
            transition: all 0.2s;
        }
        .etf-tag:hover { transform: translateY(-1px); }
        .etf-tag.bullish {
            background: rgba(248,81,73,0.12);
            border-color: rgba(248,81,73,0.35);
            color: #ff7b72;
        }
        .etf-tag.bearish {
            background: rgba(63,185,80,0.12);
            border-color: rgba(63,185,80,0.35);
            color: var(--green);
        }
        .etf-tag.neutral {
            background: rgba(139,148,158,0.12);
            border-color: rgba(139,148,158,0.35);
            color: var(--text-dim);
        }

        .stock-tag {
            display: inline-flex;
            align-items: center;
            gap: 0;
            margin: 3px;
            font-size: 12px;
            font-weight: 500;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            background: transparent;
            overflow: hidden;
            transition: all 0.2s;
        }
        .stock-tag:hover {
            transform: translateY(-1px);
            border-color: rgba(255,255,255,0.4);
        }
        .stock-tag .sentiment-label {
            padding: 5px 8px;
            font-size: 11px;
            font-weight: 700;
            color: #fff;
            white-space: nowrap;
        }
        .stock-tag.bullish .sentiment-label { background: #f85149; }
        .stock-tag.bearish .sentiment-label { background: #3fb950; }
        .stock-tag.neutral .sentiment-label { display: none; }
        .stock-tag .stock-name {
            padding: 5px 9px;
            color: #e6edf3;
            white-space: nowrap;
        }
        .stock-tag.neutral .stock-name {
            padding: 5px 10px;
            color: #8b949e;
        }

        /* ===== Footer ===== */
        footer {
            text-align: center;
            margin-top: 48px;
            padding: 24px;
            color: #484f58;
            font-size: 12px;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 768px) {
            .header h1 { font-size: 24px; }
            .news-item { padding: 16px; }
            .news-title { font-size: 15px; }
            .wukong-judgment { padding: 16px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🐵 悟空财经判断</h1>
            <div class="subtitle">
                <span>不被表面新闻迷惑，精准挖掘信息背后的真实含义</span>
            </div>
            <div class="date-display" id="currentDate"></div>
        </div>

        <!-- 时间线导航 -->
        <div class="timeline-nav" id="timelineNav"></div>

        <!-- 控制按钮 -->
        <div class="controls">
            <button class="btn" id="prevBtn" onclick="showPreviousDate()">← 前一天</button>
            <button class="btn" onclick="showToday()">📅 今天</button>
            <button class="btn" id="nextBtn" onclick="showNextDate()">后一天 →</button>
        </div>

        <!-- 新闻内容 -->
        <div id="newsContent"></div>

        <footer>
            <p>数据来源：天集 ProSearch · 权威财经媒体</p>
        </footer>
    </div>

    <script src="news-data.js"></script>
    <script>
        let currentDate = availableDates[0];

        /* ========== 中文星期 ========== */
        function getDayName(dateStr) {
            const map = ['周日','周一','周二','周三','周四','周五','周六'];
            const d = new Date(dateStr.replace(/-/g, '/'));
            return map[d.getDay()];
        }

        function formatDate(dateStr) {
            const [y, m, d] = dateStr.split('-');
            return `${parseInt(m)}月${parseInt(d)}日 ${getDayName(dateStr)}`;
        }

        /* ========== 初始化时间线 ========== */
        function initTimeline() {
            const nav = document.getElementById('timelineNav');
            nav.innerHTML = '';
            availableDates.forEach(date => {
                const item = document.createElement('div');
                item.className = 'date-item' + (date === currentDate ? ' active' : '');
                item.textContent = formatDate(date);
                item.onclick = () => { currentDate = date; updateUI(); };
                nav.appendChild(item);
            });
        }

        /* ========== 导航函数 ========== */
        function showDate(date) {
            if (!availableDates.includes(date)) return;
            currentDate = date;
            updateUI();
        }
        function showPreviousDate() {
            const idx = availableDates.indexOf(currentDate);
            if (idx < availableDates.length - 1) showDate(availableDates[idx + 1]);
        }
        function showNextDate() {
            const idx = availableDates.indexOf(currentDate);
            if (idx > 0) showDate(availableDates[idx - 1]);
        }
        function showToday() { showDate(availableDates[0]); }

        /* ========== 更新UI ========== */
        function updateUI() {
            // 更新时间线高亮
            document.querySelectorAll('.date-item').forEach((item, i) => {
                item.classList.toggle('active', availableDates[i] === currentDate);
            });
            // 更新日期显示
            document.getElementById('currentDate').textContent = formatDate(currentDate);
            // 更新按钮状态
            const idx = availableDates.indexOf(currentDate);
            document.getElementById('prevBtn').disabled = idx >= availableDates.length - 1;
            document.getElementById('nextBtn').disabled = idx <= 0;
            // 渲染新闻
            renderNews();
        }

        /* ========== 渲染新闻 ========== */
        function renderNews() {
            const news = newsData[currentDate];
            if (!news) {
                document.getElementById('newsContent').innerHTML = '<p style="text-align:center;color:#666;padding:60px;">该日期暂无新闻</p>';
                return;
            }

            let html = '';

            // 市场基调
            if (news.market_tone) {
                html += `
                    <div class="market-tone">
                        <h2>📊 今日基调</h2>
                        <p>${news.market_tone}</p>
                    </div>
                `;
            }

            // 悟空判断
            if (news.wukong_judgment) {
                const wj = news.wukong_judgment;
                html += `
                    <div class="wukong-judgment">
                        <h2>🐵 悟空今日判断</h2>
                        <div class="summary">${wj.summary || ''}</div>
                        <div class="tags-row">
                `;
                if (wj.bullish && wj.bullish.length) {
                    html += `
                        <div class="tag-group">
                            <span class="tag-label">看多：</span>
                            <div class="bullish-tags">
                                ${wj.bullish.map(s => `<span class="bullish-tag">${s}</span>`).join('')}
                            </div>
                        </div>
                    `;
                }
                if (wj.bearish && wj.bearish.length) {
                    html += `
                        <div class="tag-group">
                            <span class="tag-label">看空：</span>
                            <div class="bearish-tags">
                                ${wj.bearish.map(s => `<span class="bearish-tag">${s}</span>`).join('')}
                            </div>
                        </div>
                    `;
                }
                html += `
                        </div>
                `;
                if (wj.strategy) {
                    html += `
                        <div class="strategy">
                            <div class="strategy-label">💡 操作参考</div>
                            ${wj.strategy}
                        </div>
                    `;
                }
                html += `</div>`;
            }

            // S级新闻
            if (news.s_level && news.s_level.length) {
                html += '<div class="news-section s-level"><div class="section-title">🔴 S级 · 结构性叙事（影响1-4周）</div>';
                news.s_level.forEach(i => html += renderNewsItem(i));
                html += '</div>';
            }
            // A级新闻
            if (news.a_level && news.a_level.length) {
                html += '<div class="news-section a-level"><div class="section-title">🟡 A级 · 阶段性叙事（影响1-3天）</div>';
                news.a_level.forEach(i => html += renderNewsItem(i));
                html += '</div>';
            }
            // 抖音/平台相关
            if (news.douyin && news.douyin.length) {
                html += '<div class="news-section douyin"><div class="section-title">📱 抖音/平台相关</div>';
                news.douyin.forEach(i => html += renderNewsItem(i));
                html += '</div>';
            }
            document.getElementById('newsContent').innerHTML = html;
        }

        function renderNewsItem(item) {
            // 来源显示
            let sourceHtml = '';
            if (item.source) {
                if (item.url) {
                    sourceHtml = `<div class="news-source">来源：<a href="${item.url}" target="_blank">${item.source}</a></div>`;
                } else {
                    sourceHtml = `<div class="news-source">来源：${item.source}</div>`;
                }
            }

            // ETF 标签
            let etfHtml = '';
            if (item.etfs && item.etfs.length) {
                etfHtml = '<div class="news-row"><span class="label">📈 ETF映射：</span></div>';
                etfHtml += '<div class="tag-row">';
                item.etfs.forEach(etf => {
                    let cls = 'neutral';
                    if (etf.sentiment === '利好') cls = 'bullish';
                    else if (etf.sentiment === '利空') cls = 'bearish';
                    const icon = cls === 'bullish' ? '▲' : cls === 'bearish' ? '▼' : '●';
                    etfHtml += `<span class="etf-tag ${cls}">${icon} ${etf.name}</span>`;
                });
                etfHtml += '</div>';
            }

            // 个股标签
            let stockHtml = '';
            if (item.stocks && item.stocks.length) {
                stockHtml = '<div class="news-row"><span class="label">✨ 个股映射：</span></div>';
                stockHtml += '<div class="tag-row">';
                item.stocks.forEach(stock => {
                    const relatedEtf = item.etfs && item.etfs[0];
                    let cls = 'neutral';
                    let labelText = '';
                    if (relatedEtf) {
                        cls = relatedEtf.sentiment === '利好' ? 'bullish' : 'bearish';
                        labelText = relatedEtf.sentiment === '利好' ? '利好' : '利空';
                    }
                    stockHtml += `<span class="stock-tag ${cls}">${labelText ? `<span class="sentiment-label">${labelText}</span>` : ''}<span class="stock-name">${stock}</span></span>`;
                });
                stockHtml += '</div>';
            }

            return `
                <div class="news-item">
                    <div class="news-header">
                        <div class="news-title">${item.emoji || '📌'} ${item.title}</div>
                        ${sourceHtml}
                    </div>
                    <div class="news-row"><span class="label">📌 要点：</span>${item.summary}</div>
                    <div class="news-row"><span class="label">⏱️ 影响时长：</span>${item.duration}</div>
                    ${etfHtml}
                    ${stockHtml}
                    <div class="news-row"><span class="label">💡 资金信号：</span>${item.signal}</div>
                </div>`;
        }

        /* ========== 初始化 ========== */
        initTimeline();
        updateUI();
    </script>
</body>
</html>
