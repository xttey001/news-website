<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>悟空财经分析</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-start: #0d1117;
            --bg-end: #161b22;
            --green: #3fb950;
            --green-bg: rgba(63,185,80,0.12);
            --orange: #f0883e;
            --red: #f85149;
            --blue: #58a6ff;
            --gold: #d29922;
            --purple: #a371f7;
            --card-bg: rgba(255,255,255,0.04);
            --card-border: rgba(255,255,255,0.1);
            --text: #e6edf3;
            --text-dim: #8b949e;
            --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            font-family: var(--font);
            background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
            line-height: 1.7;
        }
        .container { max-width: 900px; margin: 0 auto; }

        /* ===== 标题 ===== */
        .header {
            text-align: center;
            margin-bottom: 32px;
            padding: 24px;
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px solid var(--card-border);
        }
        .header h1 {
            font-size: 26px;
            margin-bottom: 4px;
            background: linear-gradient(135deg, var(--green) 0%, var(--blue) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header .subtitle {
            font-size: 13px;
            color: var(--text-dim);
            margin-bottom: 8px;
            font-style: italic;
        }
        .header .date-tag {
            display: inline-block;
            margin-top: 10px;
            padding: 6px 14px;
            background: rgba(163,113,247,0.15);
            border: 1px solid rgba(163,113,247,0.3);
            border-radius: 8px;
            color: var(--purple);
            font-size: 13px;
        }

        /* ===== 导航 ===== */
        .nav-bar {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 28px;
            flex-wrap: wrap;
            padding: 14px;
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--card-border);
        }
        .date-btn {
            padding: 8px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 13px;
            color: var(--text-dim);
        }
        .date-btn:hover {
            background: rgba(63,185,80,0.1);
            border-color: var(--green);
            color: var(--green);
        }
        .date-btn.active {
            background: var(--green-bg);
            border-color: var(--green);
            color: var(--green);
            font-weight: 600;
        }

        /* ===== 区块通用 ===== */
        .section {
            background: var(--card-bg);
            border-radius: 14px;
            border: 1px solid var(--card-border);
            padding: 22px;
            margin-bottom: 24px;
        }
        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        /* ===== 今日基调 ===== */
        .tone-section {
            border: 2px solid var(--gold);
            background: linear-gradient(135deg, rgba(210,153,34,0.08) 0%, rgba(210,153,34,0.03) 100%);
        }
        .tone-section .section-title { color: var(--gold); }
        .tone-content {
            font-size: 15px;
            line-height: 1.8;
            color: var(--text);
        }

        /* ===== 悟空判断 ===== */
        .judgment-section { 
            background: linear-gradient(135deg, rgba(163,113,247,0.08) 0%, rgba(88,166,255,0.05) 100%);
            border-color: rgba(163,113,247,0.2);
        }
        .judgment-section .section-title { color: var(--purple); }
        
        /* ===== 八戒贝叶斯 ===== */
        .bayesian-section {
            background: linear-gradient(135deg, rgba(255,193,7,0.08) 0%, rgba(255,152,0,0.05) 100%);
            border-color: rgba(255,193,7,0.2);
        }
        .bayesian-section .section-title { color: #FFC107; }
        .overall-card {
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .overall-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 14px;
        }
        .stat-item {
            text-align: center;
            padding: 10px;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
        }
        .stat-label { font-size: 12px; color: var(--text-dim); }
        .stat-value { font-size: 18px; font-weight: 700; margin-top: 4px; }
        .stat-value.high { color: var(--green); }
        .stat-value.medium { color: #FFC107; }
        .stat-value.low { color: #f44336; }
        .overall-conclusion {
            font-size: 14px;
            line-height: 1.6;
            padding: 12px;
            background: rgba(255,193,7,0.08);
            border-radius: 8px;
            border-left: 3px solid #FFC107;
        }
        .decision-matrix {
            margin-top: 16px;
        }
        .matrix-title {
            font-size: 14px;
            font-weight: 600;
            color: #FFC107;
            margin-bottom: 12px;
        }
        .matrix-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .matrix-table th {
            text-align: left;
            padding: 8px;
            background: rgba(255,255,255,0.05);
            color: var(--text-dim);
            font-weight: 600;
        }
        .matrix-table td {
            padding: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .win-rate { font-weight: 600; }
        .win-rate.high { color: var(--green); }
        .win-rate.medium { color: #FFC107; }
        .win-rate.low { color: #f44336; }

        /* 贝叶斯推断卡片 */
        .bayes-analysis-list { margin-top: 16px; }
        .bayes-card {
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 12px;
        }
        .bayes-card-title {
            font-size: 14px;
            font-weight: 600;
            color: #FFC107;
            margin-bottom: 10px;
        }
        .bayes-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .bayes-table th {
            text-align: left;
            padding: 7px 8px;
            background: rgba(255,255,255,0.05);
            color: var(--text-dim);
            font-weight: 600;
        }
        .bayes-table td {
            padding: 7px 8px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .bayes-table .posterior-row td {
            border-top: 2px solid rgba(255,193,7,0.3);
            background: rgba(255,193,7,0.05);
        }
        .key-variable {
            margin-top: 10px;
            font-size: 13px;
            color: var(--text-dim);
            padding: 8px 12px;
            background: rgba(255,255,255,0.03);
            border-radius: 6px;
        }

        /* 八戒最终结论 */
        .bajie-conclusion {
            margin-top: 16px;
            background: linear-gradient(135deg, rgba(255,193,7,0.12) 0%, rgba(255,152,0,0.08) 100%);
            border: 1px solid rgba(255,193,7,0.3);
            border-radius: 10px;
            padding: 16px;
        }
        .bajie-conclusion-title {
            font-size: 15px;
            font-weight: 700;
            color: #FFC107;
            margin-bottom: 12px;
        }
        .bajie-conclusion-row {
            font-size: 14px;
            margin-bottom: 8px;
        }
        .bc-label {
            color: var(--text-dim);
            font-weight: 600;
        }
        .emotion-row {
            font-size: 14px;
            margin-bottom: 14px;
            padding-bottom: 14px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .emotion-label { color: var(--text-dim); }
        .emotion-value { 
            color: var(--green); 
            font-weight: 600;
        }
        .analysis-list {
            margin-bottom: 16px;
        }
        .analysis-item {
            position: relative;
            padding-left: 18px;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .analysis-item::before {
            content: '•';
            position: absolute;
            left: 0;
            color: var(--text-dim);
        }
        .strategy-box {
            background: linear-gradient(135deg, rgba(63,185,80,0.15) 0%, rgba(63,185,80,0.08) 100%);
            border: 1px solid rgba(63,185,80,0.3);
            border-radius: 10px;
            padding: 16px;
            margin-top: 8px;
        }
        .strategy-label {
            font-size: 13px;
            color: var(--green);
            font-weight: 600;
            margin-bottom: 10px;
        }
        .strategy-item {
            font-size: 14px;
            margin-bottom: 8px;
            line-height: 1.6;
        }

        /* ===== 新闻区块 ===== */
        .news-section.s-level .section-title { color: var(--red); }
        .news-section.a-level .section-title { color: var(--gold); }
        .news-section.douyin .section-title { color: var(--blue); }

        /* ===== 新闻卡片 ===== */
        .news-card {
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            border-left: 4px solid;
            padding: 18px;
            margin-bottom: 16px;
        }
        .s-level .news-card { border-left-color: var(--red); }
        .a-level .news-card { border-left-color: var(--gold); }
        .douyin .news-card { border-left-color: var(--blue); }

        .news-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 12px;
        }
        .news-title {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            flex: 1;
        }
        .news-source {
            padding: 4px 10px;
            background: rgba(255,255,255,0.06);
            border-radius: 6px;
            font-size: 11px;
            color: var(--text-dim);
        }
        .news-row {
            margin: 10px 0;
            font-size: 14px;
        }
        .label { 
            color: var(--text-dim); 
            margin-right: 6px;
            font-size: 13px;
        }

        /* ===== 映射标签 ===== */
        .mapping-section {
            margin-top: 14px;
        }
        .mapping-row {
            margin-bottom: 12px;
        }
        .mapping-label {
            font-size: 13px;
            color: var(--text-dim);
            margin-bottom: 8px;
        }
        .tags-wrap {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .tag-item {
            display: inline-flex;
            align-items: center;
            gap: 0;
            padding: 0;
            border-radius: 6px;
            overflow: hidden;
            font-size: 12px;
            border: 1px solid rgba(255,255,255,0.15);
            transition: all 0.2s;
        }
        .tag-item:hover {
            transform: translateY(-1px);
            border-color: rgba(255,255,255,0.3);
        }
        .tag-sentiment {
            padding: 5px 8px;
            font-weight: 700;
            font-size: 11px;
        }
        .tag-sentiment.bullish { background: var(--red); color: #fff; }
        .tag-sentiment.bearish { background: var(--green); color: #fff; }
        .tag-sentiment.neutral { background: #6e7681; color: #fff; }
        .tag-sentiment.watch { background: var(--blue); color: #fff; }
        .tag-sentiment.avoid { background: var(--orange); color: #fff; }
        .tag-name {
            padding: 5px 10px;
            color: var(--text);
        }
        .tag-note {
            padding: 5px 8px;
            color: var(--text-dim);
            font-size: 11px;
            background: rgba(255,255,255,0.03);
        }

        /* ===== 警告提示 ===== */
        .warning-box {
            margin-top: 14px;
            padding: 12px 14px;
            background: rgba(248,129,73,0.1);
            border: 1px solid rgba(248,129,73,0.25);
            border-radius: 8px;
            font-size: 13px;
            color: var(--orange);
        }

        /* ===== 分隔线 ===== */
        .section-divider {
            display: flex;
            align-items: center;
            margin: 32px 0;
            color: var(--text-dim);
            font-size: 14px;
        }
        .section-divider::before,
        .section-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--card-border), transparent);
        }
        .section-divider span {
            padding: 0 16px;
            white-space: nowrap;
        }

        /* ===== 新闻专属贝叶斯分析 ===== */
        .news-bayes-card {
            margin: 16px 0 24px 0;
            background: rgba(255,193,7,0.08);
            border: 1px solid rgba(255,193,7,0.25);
            border-radius: 10px;
            padding: 16px;
        }
        .news-bayes-card .bayes-card-title {
            color: var(--gold);
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255,193,7,0.2);
        }
        .news-bayes-card .bayes-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            margin-bottom: 12px;
        }
        .news-bayes-card .bayes-table th {
            background: rgba(255,193,7,0.15);
            color: var(--gold);
            padding: 8px 10px;
            text-align: left;
            font-weight: 600;
            border-bottom: 1px solid rgba(255,193,7,0.2);
        }
        .news-bayes-card .bayes-table td {
            padding: 8px 10px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            color: var(--text);
        }
        .news-bayes-card .bayes-table tr:last-child td {
            border-bottom: none;
        }
        .news-bayes-card .key-variable {
            display: inline-block;
            background: rgba(163,113,247,0.15);
            border: 1px solid rgba(163,113,247,0.3);
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 12px;
            color: var(--purple);
            margin-top: 8px;
        }

        /* ===== Footer ===== */
        footer {
            text-align: center;
            margin-top: 48px;
            padding: 24px;
            color: #484f58;
            font-size: 12px;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 768px) {
            .header h1 { font-size: 22px; }
            .section { padding: 16px; }
            .news-card { padding: 14px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🐵 悟空财经分析</h1>
            <div class="subtitle">不盲从主流解读，用逻辑和数据说话</div>
            <div class="date-tag" id="dateDisplay"></div>
        </div>

        <!-- 日期导航 -->
        <div class="nav-bar" id="navBar"></div>

        <!-- 内容区 -->
        <div id="content"></div>

        <footer>
            <p>数据来源：天集 ProSearch · 权威财经媒体</p>
        </footer>
    </div>

    <script src="news-data.js"></script>
    <script>
        let currentDate = availableDates[0];

        function formatDate(dateStr) {
            const [y, m, d] = dateStr.split('-');
            return `${parseInt(m)}月${parseInt(d)}日`;
        }

        function initNav() {
            const nav = document.getElementById('navBar');
            nav.innerHTML = '';
            availableDates.forEach(date => {
                const btn = document.createElement('button');
                btn.className = 'date-btn' + (date === currentDate ? ' active' : '');
                btn.textContent = formatDate(date);
                btn.onclick = () => { currentDate = date; updateUI(); };
                nav.appendChild(btn);
            });
        }

        function updateUI() {
            // 更新导航高亮
            document.querySelectorAll('.date-btn').forEach((btn, i) => {
                btn.classList.toggle('active', availableDates[i] === currentDate);
            });
            // 更新日期显示
            document.getElementById('dateDisplay').textContent = formatDate(currentDate);
            renderContent();
        }

        function getSentimentClass(sentiment) {
            const map = {
                '利好': 'bullish',
                '利空': 'bearish',
                '关注': 'watch',
                '警惕': 'avoid',
                '回避': 'avoid'
            };
            return map[sentiment] || 'neutral';
        }

        function renderTags(items) {
            if (!items || !items.length) return '';
            let html = '<div class="tags-wrap">';
            items.forEach(item => {
                const cls = getSentimentClass(item.sentiment);
                html += `<span class="tag-item">`;
                html += `<span class="tag-sentiment ${cls}">${item.sentiment}</span>`;
                html += `<span class="tag-name">${item.name}</span>`;
                if (item.note) {
                    html += `<span class="tag-note">${item.note}</span>`;
                }
                html += '</span>';
            });
            html += '</div>';
            return html;
        }

        function renderNewsCard(item) {
            let html = `
                <div class="news-card">
                    <div class="news-header">
                        <div class="news-title">${item.emoji} ${item.title}</div>
                        <div class="news-source">来源：${item.source}</div>
                    </div>
                    <div class="news-row"><span class="label">要点：</span>${item.summary}</div>
                    <div class="news-row"><span class="label">影响时长：</span>${item.duration}</div>`;

            if (item.etfs && item.etfs.length) {
                html += `
                    <div class="mapping-section">
                        <div class="mapping-row">
                            <div class="mapping-label">📈 ETF映射：</div>
                            ${renderTags(item.etfs)}
                        </div>
                    </div>`;
            }

            if (item.stocks && item.stocks.length) {
                html += `
                    <div class="mapping-section">
                        <div class="mapping-row">
                            <div class="mapping-label">✨ 个股映射：</div>
                            ${renderTags(item.stocks)}
                        </div>
                    </div>`;
            }

            if (item.signal) {
                html += `<div class="warning-box">💡 ${item.signal}</div>`;
            }

            html += '</div>';
            return html;
        }

        // 渲染单条新闻的贝叶斯分析
        function renderNewsBayesAnalysis(newsTitle, bayesData) {
            if (!bayesData) return '';
            const pc = bayesData.posterior >= 65 ? 'high' : bayesData.posterior >= 50 ? 'medium' : 'low';
            return `
            <div class="bayes-card news-bayes-card">
                <div class="bayes-card-title">🧮 八戒贝叶斯分析</div>
                <table class="bayes-table">
                    <thead>
                        <tr><th>维度</th><th>判断</th><th>概率</th></tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>先验（市场基准）</td>
                            <td>历史基准</td>
                            <td>${bayesData.prior}%</td>
                        </tr>
                        <tr>
                            <td>似然（数据验证）</td>
                            <td>新闻信息强度</td>
                            <td>${bayesData.likelihood}%</td>
                        </tr>
                        <tr class="posterior-row">
                            <td>后验（综合）</td>
                            <td>做多概率</td>
                            <td><strong class="win-rate ${pc}">${bayesData.posterior}%</strong></td>
                        </tr>
                        <tr>
                            <td>预期收益率</td>
                            <td>ETF/个股</td>
                            <td><strong>${bayesData.expected_return}</strong></td>
                        </tr>
                        <tr>
                            <td>置信区间</td>
                            <td>95%CI</td>
                            <td>${bayesData.confidence}</td>
                        </tr>
                    </tbody>
                </table>
                <div class="key-variable">💡 关键变量：${bayesData.key_variable}</div>
            </div>`;
        }

        function renderContent() {
            const data = newsData[currentDate];
            if (!data) {
                document.getElementById('content').innerHTML = '<p style="text-align:center;color:#666;padding:60px;">该日期暂无数据</p>';
                return;
            }

            let html = '';

            // 今日基调
            if (data.market_tone) {
                html += `
                    <div class="section tone-section">
                        <div class="section-title">📊 今日基调</div>
                        <div class="tone-content">${data.market_tone}</div>
                    </div>`;
            }

            // 悟空今日判断
            if (data.wukong_judgment) {
                const wj = data.wukong_judgment;
                html += `
                    <div class="section judgment-section">
                        <div class="section-title">📈 悟空今日判断</div>`;
                
                if (wj.emotion) {
                    html += `
                        <div class="emotion-row">
                            <span class="emotion-label">大盘情绪：</span>
                            <span class="emotion-value">${wj.emotion}</span>
                        </div>`;
                }

                if (wj.analysis && wj.analysis.length) {
                    html += '<div class="analysis-list">';
                    wj.analysis.forEach(a => {
                        html += `<div class="analysis-item">${a}</div>`;
                    });
                    html += '</div>';
                }

                if (wj.strategy && wj.strategy.length) {
                    html += `
                        <div class="strategy-box">
                            <div class="strategy-label">今日操作参考：</div>`;
                    wj.strategy.forEach(s => {
                        html += `<div class="strategy-item">${s}</div>`;
                    });
                    html += '</div>';
                }

                html += '</div>';
            }

            // 决策矩阵 + 八戒最终结论（汇总部分）
            if (data.bajie_bayesian) {
                const bj = data.bajie_bayesian;

                // 决策矩阵表格
                if (bj.decision_matrix && bj.decision_matrix.length) {
                    html += `
                    <div class="section matrix-section">
                        <div class="section-title">📊 决策矩阵</div>
                        <div class="decision-matrix">
                            <table class="matrix-table">
                                <thead>
                                    <tr>
                                        <th>新闻</th>
                                        <th>胜率</th>
                                        <th>预期收益</th>
                                        <th>风险比</th>
                                        <th>建议</th>
                                    </tr>
                                </thead>
                                <tbody>`;
                    bj.decision_matrix.forEach(m => {
                        const rc = m.win_rate >= 65 ? 'high' : m.win_rate >= 50 ? 'medium' : 'low';
                        html += `
                                    <tr>
                                        <td>${m.news}</td>
                                        <td><span class="win-rate ${rc}">${m.win_rate}%</span></td>
                                        <td>${m.expected_return}</td>
                                        <td>${m.risk_ratio}</td>
                                        <td>${m.action}</td>
                                    </tr>`;
                    });
                    html += `
                                </tbody>
                            </table>
                        </div>
                    </div>`;
                }

                // 八戒最终结论
                if (bj.overall) {
                    const o = bj.overall;
                    const wrClass = o.win_rate >= 65 ? 'high' : o.win_rate >= 50 ? 'medium' : 'low';
                    html += `
                    <div class="section conclusion-section">
                        <div class="section-title">🧠 八戒最终结论</div>
                        <div class="bajie-conclusion">
                            <div class="bajie-conclusion-row"><span class="bc-label">最优行动：</span><span>${o.best_action}</span></div>
                            <div class="bajie-conclusion-row"><span class="bc-label">最优ETF组合：</span><span>${o.best_etfs}</span></div>
                            <div class="bajie-conclusion-row"><span class="bc-label">胜率：</span><span class="win-rate ${wrClass}">~${o.win_rate}%（贝叶斯后验）</span></div>
                            <div class="bajie-conclusion-row"><span class="bc-label">最大回撤警戒：</span><span class="win-rate low">${o.stop_loss}%（止损线）</span></div>
                        </div>
                    </div>`;
                }
            }

            // 分隔线
            html += `<div class="section-divider"><span>=== 新闻详情 ===</span></div>`;

            // 智能匹配新闻和贝叶斯分析
            function findBayesForNews(newsTitle, newsAnalysisList, decisionMatrix) {
                if (!newsAnalysisList) return null;
                
                // 1. 精确匹配
                const exact = newsAnalysisList.find(na => na.news_title === newsTitle);
                if (exact) return exact;
                
                // 2. 核心概念匹配（提取2-4字的核心概念进行匹配）
                const titlePrefix = newsTitle.replace(/[：:].*$/, '');
                const coreConcepts = [];
                
                // 提取常见财经概念词
                const conceptPatterns = ['原油', '黄金', '美股', 'AI芯片', '芯片', 'CPO', '光模块', 'A股', '央行', '油气', '科技', '存储', '新能源', '锂电', '光伏', '医药', '银行', '地产'];
                conceptPatterns.forEach(concept => {
                    if (titlePrefix.includes(concept)) {
                        coreConcepts.push(concept);
                    }
                });
                
                // 按概念匹配
                for (const na of newsAnalysisList) {
                    for (const concept of coreConcepts) {
                        if (na.news_title.includes(concept)) {
                            return na;
                        }
                    }
                }
                
                // 3. 反向包含匹配
                for (const na of newsAnalysisList) {
                    if (newsTitle.includes(na.news_title) || na.news_title.includes(newsTitle.substring(0, 10))) {
                        return na;
                    }
                }

                // 4. 决策矩阵匹配
                if (decisionMatrix) {
                    for (const dm of decisionMatrix) {
                        // 检查决策矩阵的新闻名称是否在新闻标题中
                        if (newsTitle.includes(dm.news) || 
                            (dm.news.length > 4 && titlePrefix.includes(dm.news.substring(0, 6)))) {
                            const matched = newsAnalysisList.find(na => na.news_title === dm.news);
                            if (matched) return matched;
                        }
                        // 检查核心概念是否匹配
                        for (const concept of coreConcepts) {
                            if (dm.news.includes(concept)) {
                                const matched = newsAnalysisList.find(na => na.news_title === dm.news);
                                if (matched) return matched;
                            }
                        }
                    }
                }
                
                return null;
            }

            // S级
            if (data.s_level && data.s_level.length) {
                html += `
                    <div class="section news-section s-level">
                        <div class="section-title">🔴 S级（结构性叙事，影响1-4周）</div>`;
                data.s_level.forEach(item => {
                    html += renderNewsCard(item);
                    // 查找并渲染对应的贝叶斯分析
                    const bayes = findBayesForNews(item.title, data.bajie_bayesian?.news_analysis, data.bajie_bayesian?.decision_matrix);
                    if (bayes) {
                        html += renderNewsBayesAnalysis(item.title, bayes);
                    }
                });
                html += '</div>';
            }

            // A级
            if (data.a_level && data.a_level.length) {
                html += `
                    <div class="section news-section a-level">
                        <div class="section-title">🟡 A级（阶段性叙事，影响1-3天）</div>`;
                data.a_level.forEach(item => {
                    html += renderNewsCard(item);
                    const bayes = findBayesForNews(item.title, data.bajie_bayesian?.news_analysis, data.bajie_bayesian?.decision_matrix);
                    if (bayes) {
                        html += renderNewsBayesAnalysis(item.title, bayes);
                    }
                });
                html += '</div>';
            }

            // 抖音/平台
            if (data.douyin && data.douyin.length) {
                html += `
                    <div class="section news-section douyin">
                        <div class="section-title">📱 抖音/平台相关</div>`;
                data.douyin.forEach(item => {
                    html += renderNewsCard(item);
                    const bayes = findBayesForNews(item.title, data.bajie_bayesian?.news_analysis, data.bajie_bayesian?.decision_matrix);
                    if (bayes) {
                        html += renderNewsBayesAnalysis(item.title, bayes);
                    }
                });
                html += '</div>';
            }

            document.getElementById('content').innerHTML = html;
        }

        // 初始化
        initNav();
        updateUI();
    </script>
</body>
</html>
