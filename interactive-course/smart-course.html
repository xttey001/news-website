<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能课件生成器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            min-height: 100vh;
            transition: all 0.3s ease;
        }
        
        /* ========== 深色主题 (VDF风格) ========== */
        body.theme-dark {
            background: #121212;
            color: #fff;
        }
        body.theme-dark .tabs {
            background: #1e1e1e;
            border-bottom: 1px solid #333;
        }
        body.theme-dark .tab { color: #aaa; }
        body.theme-dark .tab.active { color: #fff; border-bottom-color: #e53935; }
        body.theme-dark .card {
            background: #1e1e1e;
            border-left: 4px solid;
        }
        body.theme-dark .card.c-red { border-left-color: #e53935; }
        body.theme-dark .card.c-green { border-left-color: #4CAF50; }
        body.theme-dark .card.c-yellow { border-left-color: #FFC107; }
        body.theme-dark .card.c-blue { border-left-color: #2196F3; }
        body.theme-dark .card.c-purple { border-left-color: #9C27B0; }
        body.theme-dark .card h3 { color: #fff; }
        body.theme-dark .card p { color: #aaa; }
        body.theme-dark .hint {
            background: #fff;
            color: #121212;
        }
        body.theme-dark .controls { background: #1e1e1e; }
        body.theme-dark .nav-btn { color: #fff; border-color: #444; }
        body.theme-dark .nav-btn:hover:not(:disabled) { background: #e53935; border-color: #e53935; }
        body.theme-dark .page-indicator { color: #aaa; }
        body.theme-dark .progress-bar { background: #333; }
        body.theme-dark .progress-fill { background: #e53935; }
        
        /* ========== 浅色主题 ========== */
        body.theme-light {
            background: #f8f9fa;
            color: #333;
        }
        body.theme-light .tabs {
            background: #fff;
            border-bottom: 1px solid #e0e0e0;
        }
        body.theme-light .tab { color: #888; }
        body.theme-light .tab.active { color: #667eea; border-bottom-color: #667eea; }
        body.theme-light .card {
            background: #fff;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            border-left: 4px solid;
        }
        body.theme-light .card.c-red { border-left-color: #e53935; }
        body.theme-light .card.c-green { border-left-color: #4CAF50; }
        body.theme-light .card.c-yellow { border-left-color: #FFC107; }
        body.theme-light .card.c-blue { border-left-color: #2196F3; }
        body.theme-light .card.c-purple { border-left-color: #9C27B0; }
        body.theme-light .card h3 { color: #1a1a2e; }
        body.theme-light .card p { color: #666; }
        body.theme-light .hint {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }
        body.theme-light .controls { background: #fff; box-shadow: 0 -4px 20px rgba(0,0,0,0.05); }
        body.theme-light .nav-btn { color: #667eea; border-color: #e0e0e0; background: #fff; }
        body.theme-light .nav-btn:hover:not(:disabled) { background: #667eea; border-color: #667eea; color: #fff; }
        body.theme-light .page-indicator { color: #667eea; }
        body.theme-light .progress-bar { background: #e0e0e0; }
        body.theme-light .progress-fill { background: linear-gradient(90deg, #667eea 0%, #764ba2 100%); }
        
        /* ========== 公共样式 ========== */
        .input-page {
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #121212;
        }
        .input-title {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .input-subtitle { color: #888; margin-bottom: 30px; }
        .input-box {
            max-width: 700px;
            width: 100%;
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
        }
        textarea {
            width: 100%;
            min-height: 200px;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 1rem;
            line-height: 1.8;
            resize: vertical;
            outline: none;
        }
        textarea::placeholder { color: #666; }
        .generate-btn {
            max-width: 700px;
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .generate-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3); }
        
        /* 课件页面 */
        .course-page { display: none; }
        .course-page.active { display: block; }
        
        /* 顶部标签栏 */
        .tabs {
            display: flex;
            gap: 20px;
            padding: 12px 20px;
            overflow-x: auto;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .tab {
            font-size: 14px;
            white-space: nowrap;
            cursor: pointer;
            padding: 8px 0;
            border-bottom: 2px solid transparent;
            transition: all 0.3s;
        }
        
        /* 幻灯片容器 */
        .slide-container {
            padding: 24px 20px 140px;
            max-width: 700px;
            margin: 0 auto;
        }
        .slide {
            display: none;
            animation: fadeIn 0.4s ease;
        }
        .slide.active { display: block; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* 幻灯片头部 */
        .slide-header { margin-bottom: 24px; }
        .slide-header .small {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        body.theme-dark .slide-header .small { color: #e53935; }
        body.theme-light .slide-header .small { color: #667eea; }
        .slide-header h1 {
            font-size: 26px;
            font-weight: 700;
            line-height: 1.4;
        }
        
        /* 卡片样式 */
        .card {
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            opacity: 0;
            transform: translateX(-20px);
            transition: all 0.4s ease;
        }
        .card.visible {
            opacity: 1;
            transform: translateX(0);
        }
        .card h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .badge {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            color: #fff;
        }
        .card p {
            font-size: 14px;
            line-height: 1.7;
        }
        
        /* 底部高亮提示 */
        .hint {
            padding: 14px 24px;
            border-radius: 24px;
            font-size: 15px;
            font-weight: 500;
            text-align: center;
            margin-top: 28px;
            opacity: 0;
            transform: scale(0.95);
            transition: all 0.4s ease;
        }
        .hint.visible {
            opacity: 1;
            transform: scale(1);
        }
        
        /* 进度条 */
        .progress {
            position: fixed;
            bottom: 70px;
            left: 0;
            right: 0;
            height: 3px;
        }
        .progress-bar {
            height: 100%;
            transition: width 0.3s ease;
        }
        
        /* 翻页控制 */
        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 24px;
            padding: 10px 20px;
            border-radius: 30px;
        }
        .nav-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 2px solid;
            background: transparent;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .page-indicator {
            font-size: 14px;
            min-width: 60px;
            text-align: center;
        }
        
        /* 响应式 */
        @media (max-width: 600px) {
            .slide-header h1 { font-size: 22px; }
            .card { padding: 16px; }
            .tabs { gap: 16px; padding: 10px 16px; }
        }
    </style>
</head>
<body class="theme-dark">
    <!-- 输入页面 -->
    <div class="input-page" id="inputPage">
        <h1 class="input-title">🎨 智能课件生成器</h1>
        <p class="input-subtitle">粘贴文本，自动识别风格，生成精美课件</p>
        
        <div class="input-box">
            <textarea id="articleInput" placeholder="在这里粘贴你的内容...

系统会自动：
• 识别内容类型（方法/知识/总结）
• 选择最佳配色风格
• 提取核心要点分页
• 生成顶部标签导航
• 添加平滑翻页动画

支持格式：
第一/第二/第三...
步骤1/步骤2/步骤3...
要点A/要点B/要点C...

或直接粘贴任意段落"></textarea>
        </div>
        
        <button class="generate-btn" onclick="generateCourse()">✨ 生成课件</button>
    </div>

    <!-- 课件页面 -->
    <div class="course-page" id="coursePage">
        <div class="tabs" id="tabs"></div>
        <div class="slide-container" id="slideContainer"></div>
        
        <div class="progress">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        
        <div class="controls">
            <button class="nav-btn" id="prevBtn" onclick="prevSlide()">↑</button>
            <span class="page-indicator" id="pageIndicator">1 / 5</span>
            <button class="nav-btn" id="nextBtn" onclick="nextSlide()">↓</button>
        </div>
    </div>

    <script>
        // ==================== 在这里粘贴你的文本 ====================
        let inputText = `VDF 公式 = 跟 AI 高效沟通的秘密武器

你是不是也这样？跟 AI 说了半天，它还是不懂你要什么。

模糊指令：「帮我做个记账 App」
→ AI 不知道你要 Web 还是 App
→ 不知道要什么功能
→ 自由发挥 = 改十轮

Vibe Coding 正确姿势：
[C] 角色：想管理日常开销的上班族
[G] 目标：极简记账，收支+月度汇总
[X] 约束：❌ 登录/同步/图表/预算提醒
[A] 验收：打开即用，刷新不丢数据

VDF 四步公式 = CGXA

C · Context · 我是谁
确定角色和上下文，AI 就知道往哪走

G · Goal · 我要什么
明确核心功能范围，不让 AI 自由发挥

X · 别做什么 · Constraints
约束边界，你不说不做什么，AI 就往死里加

A · Acceptance · 什么算完成
有验收标准，AI 自己知道该停了

记住一个公式 VDF (Vibe Demand Formula)

真正的 Vibe Coding 是 5 步闭环：
1. 先写 PRD - 想清楚再动手
2. VDF 写 Prompt - 结构化表达
3. AI 生成 - Claude/Cursor 生成代码
4. 验证迭代 - 运行+测试+精准反馈
5. 上线优化 - 部署上线持续优化

万能 VDF 模板：
[C] 我是【角色/身份】
[G] 我想做【具体产品/功能】
核心需求：
- 【需求1】
- 【需求2】
[X] 不要做：
- ❌ 【不需要的1】
- ❌ 【不需要的2】
[A] 完成标准：
- ✅ 【验收1】
- ✅ 【验收2】
输出格式：单 HTML 文件，纯前端

公式是起点，实战才是真功夫。

需求表达 + 审查力 + 系统思维 + 产品思维 = Vibe Coder 核心竞争力`;
        // =========================================================

        let slides = [];
        let currentSlide = 0;
        let isDarkTheme = true;

        // 智能分析内容类型
        function analyzeContent(text) {
            const hasFormula = /公式|步骤|方法|技巧|攻略/.test(text);
            const hasSteps = /(第一|第二|第三|步骤|要点|策略)/.test(text);
            const hasConstraints = /约束|限制|别做|不要/.test(text);
            
            // 判断主题
            if (hasFormula && hasSteps && hasConstraints) {
                return { theme: 'dark', style: 'formula', colors: ['c-red', 'c-green', 'c-yellow', 'c-blue', 'c-purple'] };
            } else if (hasSteps) {
                return { theme: 'dark', style: 'steps', colors: ['c-blue', 'c-green', 'c-yellow', 'c-red', 'c-purple'] };
            } else {
                return { theme: 'light', style: 'knowledge', colors: ['c-purple', 'c-blue', 'c-green', 'c-yellow', 'c-red'] };
            }
        }

        // 智能解析内容
        function parseContent(text) {
            const lines = text.split('\n').filter(l => l.trim());
            const title = lines[0] || '智能课件';
            const sections = [];
            let currentSection = null;
            
            for (let line of lines.slice(1)) {
                // 识别小节标题
                if (line.match(/^(你是不是|模糊指令|Vibe Coding|记住|真正的|万能|公式是)/)) {
                    if (currentSection) sections.push(currentSection);
                    currentSection = { title: line, points: [] };
                }
                // 识别要点
                else if (line.match(/^[•\-\*]\s/)) {
                    if (!currentSection) currentSection = { title: '', points: [] };
                    currentSection.points.push(line.replace(/^[•\-\*]\s*/, ''));
                }
                // 识别步骤
                else if (line.match(/^(C|G|X|A)\s*[·\.\-]/)) {
                    if (!currentSection) currentSection = { title: '核心要点', points: [] };
                    const match = line.match(/^(C|G|X|A)\s*[·\.\-]\s*(.+)/);
                    if (match) {
                        currentSection.points.push({ key: match[1], text: match[2] });
                    }
                }
                // 识别数字步骤
                else if (line.match(/^\d+[\.\、]/)) {
                    if (!currentSection) currentSection = { title: '执行步骤', points: [] };
                    currentSection.points.push(line.replace(/^\d+[\.\、]\s*/, ''));
                }
            }
            
            if (currentSection) sections.push(currentSection);
            return { title, sections };
        }

        // 生成幻灯片
        function generateSlides(data, styleConfig) {
            const slides = [];
            const { title, sections } = data;
            const colors = styleConfig.colors;
            
            // 封面
            slides.push({
                tab: '引言',
                html: `
                    <div class="slide-header">
                        <div class="small">INTRODUCTION</div>
                        <h1>${title}</h1>
                    </div>
                    ${sections[0] ? `
                    <div class="card ${colors[0]}">
                        <h3>💡 核心问题</h3>
                        <p>${sections[0].title}</p>
                    </div>
                    ` : ''}
                    <div class="hint">滑动查看完整内容 ↓</div>
                `
            });
            
            // 内容页
            sections.slice(1).forEach((section, idx) => {
                const color = colors[idx % colors.length];
                const tabName = section.title.slice(0, 6) + (section.title.length > 6 ? '...' : '');
                
                let pointsHtml = '';
                if (section.points.length > 0) {
                    if (typeof section.points[0] === 'object') {
                        // CGXA 格式
                        const keyLabels = { C: 'Context', G: 'Goal', X: 'Constraints', A: 'Acceptance' };
                        const keyColors = { C: '#e53935', G: '#4CAF50', X: '#FFC107', A: '#2196F3' };
                        pointsHtml = section.points.map(p => `
                            <div class="card ${color}">
                                <h3><span class="badge" style="background:${keyColors[p.key] || '#667eea'};">${p.key}</span> ${keyLabels[p.key] || p.key}</h3>
                                <p>${p.text}</p>
                            </div>
                        `).join('');
                    } else {
                        // 普通列表
                        pointsHtml = section.points.map((p, i) => `
                            <div class="card ${colors[i % colors.length]}">
                                <h3><span class="badge" style="background:#667eea;">${i + 1}</span> ${p.slice(0, 30)}${p.length > 30 ? '...' : ''}</h3>
                                <p>${p}</p>
                            </div>
                        `).join('');
                    }
                }
                
                slides.push({
                    tab: tabName,
                    html: `
                        <div class="slide-header">
                            <div class="small">STEP ${idx + 1}</div>
                            <h1>${section.title}</h1>
                        </div>
                        ${pointsHtml}
                        <div class="hint">${idx === sections.length - 2 ? '记住这个公式' : '继续下滑 ↓'}</div>
                    `
                });
            });
            
            // 结语
            slides.push({
                tab: '结语',
                html: `
                    <div class="slide-header" style="text-align: center;">
                        <div class="small">CONCLUSION</div>
                        <h1>公式是起点<br>实战才是真功夫</h1>
                    </div>
                    <div style="display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; margin: 24px 0;">
                        <div class="card ${colors[0]}" style="text-align: center; min-width: 80px; padding: 16px;">
                            <div style="font-size: 24px; margin-bottom: 8px;">📝</div>
                            <p style="font-size: 12px;">需求表达</p>
                        </div>
                        <div class="card ${colors[1]}" style="text-align: center; min-width: 80px; padding: 16px;">
                            <div style="font-size: 24px; margin-bottom: 8px;">🔍</div>
                            <p style="font-size: 12px;">审查力</p>
                        </div>
                        <div class="card ${colors[2]}" style="text-align: center; min-width: 80px; padding: 16px;">
                            <div style="font-size: 24px; margin-bottom: 8px;">🧩</div>
                            <p style="font-size: 12px;">系统思维</p>
                        </div>
                        <div class="card ${colors[3]}" style="text-align: center; min-width: 80px; padding: 16px;">
                            <div style="font-size: 24px; margin-bottom: 8px;">🍒</div>
                            <p style="font-size: 12px;">产品思维</p>
                        </div>
                    </div>
                    <div class="hint">= Vibe Coder 核心竞争力</div>
                `
            });
            
            return slides;
        }

        function generateCourse() {
            const text = document.getElementById('articleInput').value.trim() || inputText;
            
            // 分析内容风格
            const styleConfig = analyzeContent(text);
            isDarkTheme = styleConfig.theme === 'dark';
            document.body.className = `theme-${styleConfig.theme}`;
            
            // 解析并生成
            const data = parseContent(text);
            slides = generateSlides(data, styleConfig);
            
            // 渲染标签栏
            document.getElementById('tabs').innerHTML = slides.map((s, i) => 
                `<div class="tab ${i === 0 ? 'active' : ''}" onclick="goToSlide(${i})">${s.tab}</div>`
            ).join('');
            
            // 渲染幻灯片
            document.getElementById('slideContainer').innerHTML = slides.map((s, i) => 
                `<div class="slide ${i === 0 ? 'active' : ''}" data-index="${i}">${s.html}</div>`
            ).join('');
            
            // 显示课件页面
            document.getElementById('inputPage').style.display = 'none';
            document.getElementById('coursePage').classList.add('active');
            
            currentSlide = 0;
            updateControls();
            animateCards();
        }

        function animateCards() {
            const activeSlide = document.querySelector('.slide.active');
            if (activeSlide) {
                const cards = activeSlide.querySelectorAll('.card');
                cards.forEach((card, i) => {
                    setTimeout(() => card.classList.add('visible'), i * 120);
                });
                const hint = activeSlide.querySelector('.hint');
                if (hint) {
                    setTimeout(() => hint.classList.add('visible'), cards.length * 120 + 200);
                }
            }
        }

        function updateControls() {
            document.getElementById('pageIndicator').textContent = `${currentSlide + 1} / ${slides.length}`;
            document.getElementById('progressBar').style.width = `${((currentSlide + 1) / slides.length) * 100}%`;
            document.getElementById('prevBtn').disabled = currentSlide === 0;
            document.getElementById('nextBtn').disabled = currentSlide === slides.length - 1;
            
            document.querySelectorAll('.tab').forEach((tab, i) => {
                tab.classList.toggle('active', i === currentSlide);
            });
        }

        function goToSlide(index) {
            if (index >= 0 && index < slides.length) {
                document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
                document.querySelectorAll('.slide')[index].classList.add('active');
                currentSlide = index;
                updateControls();
                animateCards();
            }
        }

        function nextSlide() { goToSlide(currentSlide + 1); }
        function prevSlide() { goToSlide(currentSlide - 1); }

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (!document.getElementById('coursePage').classList.contains('active')) return;
            if (e.key === 'ArrowDown' || e.key === ' ') { e.preventDefault(); nextSlide(); }
            else if (e.key === 'ArrowUp') { e.preventDefault(); prevSlide(); }
        });

        // 触摸滑动
        let touchStartY = 0;
        document.addEventListener('touchstart', (e) => { touchStartY = e.touches[0].clientY; });
        document.addEventListener('touchend', (e) => {
            if (!document.getElementById('coursePage').classList.contains('active')) return;
            const diff = touchStartY - e.changedTouches[0].clientY;
            if (Math.abs(diff) > 50) {
                if (diff > 0) nextSlide();
                else prevSlide();
            }
        });

        // 初始化
        window.onload = () => {
            document.getElementById('articleInput').value = inputText;
        };
    </script>
</body>
</html>
