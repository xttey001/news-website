<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章转课件 - AI 自动生成</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
        }

        /* 输入页面样式 */
        .input-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .input-container {
            max-width: 800px;
            width: 100%;
            text-align: center;
        }

        .input-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 20px;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input-subtitle {
            font-size: 1.1rem;
            color: rgba(255,255,255,0.6);
            margin-bottom: 40px;
        }

        .input-box {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            min-height: 200px;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 1rem;
            line-height: 1.8;
            resize: vertical;
            outline: none;
        }

        textarea::placeholder {
            color: rgba(255,255,255,0.4);
        }

        .or-divider {
            display: flex;
            align-items: center;
            gap: 20px;
            margin: 30px 0;
            color: rgba(255,255,255,0.5);
        }

        .or-divider::before,
        .or-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.2);
        }

        .url-input {
            width: 100%;
            padding: 16px 24px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            outline: none;
        }

        .url-input::placeholder {
            color: rgba(255,255,255,0.4);
        }

        .generate-btn {
            margin-top: 30px;
            padding: 18px 60px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }

        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.4);
        }

        .generate-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* 加载动画 */
        .loading {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-top: 40px;
        }

        .loading.active {
            display: flex;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: rgba(255,255,255,0.7);
        }

        /* 课件展示页面 */
        .course-page {
            display: none;
            min-height: 100vh;
            flex-direction: column;
        }

        .course-page.active {
            display: flex;
        }

        .course-header {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .back-btn {
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        .course-main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            position: relative;
        }

        .slide-container {
            max-width: 900px;
            width: 100%;
            text-align: center;
        }

        .slide-title {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 40px;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0;
            animation: fadeInUp 0.6s ease forwards;
        }

        .slide-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 50px 60px;
            border: 1px solid rgba(255,255,255,0.15);
            position: relative;
            opacity: 0;
            animation: fadeInUp 0.6s ease 0.2s forwards;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.3);
        }

        .slide-badge {
            position: absolute;
            top: -15px;
            left: 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 8px 24px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .slide-content {
            font-size: 1.8rem;
            font-weight: 600;
            margin: 20px 0 25px;
            line-height: 1.6;
        }

        .slide-detail {
            font-size: 1.1rem;
            color: rgba(255,255,255,0.7);
            line-height: 1.8;
        }

        .slide-highlight {
            display: inline-block;
            background: linear-gradient(90deg, rgba(102, 126, 234, 0.3) 0%, rgba(118, 75, 162, 0.3) 100%);
            padding: 8px 16px;
            border-radius: 8px;
            margin-top: 20px;
            font-weight: 500;
        }

        .pointer {
            position: absolute;
            font-size: 3rem;
            animation: pointerBounce 1.5s ease-in-out infinite;
        }

        @keyframes pointerBounce {
            0%, 100% { transform: translate(0, 0) rotate(-15deg); }
            50% { transform: translate(10px, -10px) rotate(-15deg); }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .course-footer {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            padding: 30px 40px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .nav-btn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .nav-btn:hover:not(:disabled) {
            background: rgba(102, 126, 234, 0.2);
            border-color: #667eea;
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .progress-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            min-width: 200px;
        }

        .page-number {
            font-size: 1.1rem;
            font-weight: 600;
            color: #667eea;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.15);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 2px;
            transition: width 0.4s ease;
        }

        /* 示例文章 */
        .examples {
            margin-top: 40px;
            text-align: left;
        }

        .examples-title {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.5);
            margin-bottom: 15px;
        }

        .example-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .example-tag {
            padding: 8px 16px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 20px;
            font-size: 0.9rem;
            color: rgba(255,255,255,0.7);
            cursor: pointer;
            transition: all 0.3s;
        }

        .example-tag:hover {
            background: rgba(102, 126, 234, 0.2);
            border-color: #667eea;
        }
    </style>
</head>
<body>
    <!-- 输入页面 -->
    <div class="input-page" id="inputPage">
        <div class="input-container">
            <h1 class="input-title">📝 文章转课件</h1>
            <p class="input-subtitle">粘贴任意文章，AI 自动提取核心要点，生成交互式课件</p>
            
            <div class="input-box">
                <textarea id="articleInput" placeholder="在这里粘贴文章内容...

支持：
• 长篇文章
• 技术文档  
• 教程指南
• 读书笔记
• 会议纪要

AI 会自动分析结构，提取核心观点"></textarea>
            </div>

            <div class="or-divider">或者</div>

            <input type="text" class="url-input" id="urlInput" placeholder="粘贴文章链接（支持微信公众号、知乎、CSDN 等）">

            <button class="generate-btn" id="generateBtn" onclick="generateCourse()">
                ✨ 生成课件
            </button>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p class="loading-text">AI 正在分析文章并生成课件...</p>
            </div>

            <div class="examples">
                <p class="examples-title">💡 试试这些示例：</p>
                <div class="example-tags">
                    <span class="example-tag" onclick="loadExample('startup')">📊 创业方法论</span>
                    <span class="example-tag" onclick="loadExample('product')">🚀 产品设计原则</span>
                    <span class="example-tag" onclick="loadExample('ai')">🤖 AI 应用指南</span>
                    <span class="example-tag" onclick="loadExample('marketing')">📈 增长黑客</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 课件展示页面 -->
    <div class="course-page" id="coursePage">
        <header class="course-header">
            <button class="back-btn" onclick="backToInput()">← 返回编辑</button>
            <div>🎓 AI 生成课件</div>
            <button class="back-btn" onclick="exportCourse()">📥 导出</button>
        </header>

        <main class="course-main">
            <div class="slide-container" id="slideContainer">
                <!-- 动态生成 -->
            </div>
        </main>

        <footer class="course-footer">
            <button class="nav-btn" id="prevBtn" onclick="prevSlide()">↑</button>
            <div class="progress-section">
                <span class="page-number" id="pageNumber">01 / 05</span>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 20%"></div>
                </div>
            </div>
            <button class="nav-btn" id="nextBtn" onclick="nextSlide()">↓</button>
        </footer>
    </div>

    <script>
        // 示例文章数据
        const examples = {
            startup: `创业公司的生存法则

第一，找到真正的痛点。很多创业者失败是因为解决了一个不存在的问题。你需要深入用户场景，找到他们愿意付费解决的痛点。

第二，快速验证假设。不要花一年时间去开发一个完美的产品。用两周时间做出 MVP，快速投放市场测试，根据反馈迭代。

第三，控制烧钱速度。现金流是创业公司的生命线。在找到盈利模式之前，保持精简团队，把每一分钱花在刀刃上。

第四，组建互补团队。技术、产品、运营，三个人缺一不可。找比你更强的人加入，而不是找听话的人。

第五，保持战略定力。市场会有波动，竞争对手会有动作，但你要坚持自己的核心判断，不被噪音干扰。`,

            product: `产品设计的五个核心原则

原则一：用户至上。所有设计决策都要以用户需求为出发点，而不是技术可行性或老板喜好。

原则二：简洁至上。功能不是越多越好。砍掉 80% 的功能，专注于把核心功能做到极致。

原则三：快速迭代。不要追求一步到位。小步快跑，持续收集用户反馈，不断优化体验。

原则四：数据驱动。用数据说话，而不是凭感觉。A/B 测试是验证假设的最佳方式。

原则五：情感化设计。好的产品不仅好用，还要让用户感到愉悦。细节决定成败。`,

            ai: `AI 时代的生存指南

第一步：拥抱变化。AI 不会取代人类，但会用 AI 的人会取代不会用 AI 的人。保持学习心态。

第二步：找到结合点。思考 AI 如何赋能你的工作。是提升效率？还是创造新可能？

第三步：提示工程。学会和 AI 对话是一门艺术。清晰的指令、恰当的上下文、持续的迭代。

第四步：人机协作。把重复性工作交给 AI，把创造性工作留给自己。发挥各自优势。

第五步：持续进化。AI 技术日新月异。保持好奇心，持续学习新工具、新方法。`,

            marketing: `增长黑客的六大策略

策略一：病毒传播。设计分享机制，让用户成为你的传播者。Dropbox 的邀请奖励是经典案例。

策略二：内容营销。持续输出有价值的内容，建立行业影响力。长期主义，复利效应。

策略三：产品驱动增长。产品本身就是最好的营销。让用户体验到「啊哈时刻」。

策略四：数据优化。建立完整的增长漏斗，用数据找到瓶颈，持续优化转化率。

策略五：社群运营。把用户聚集起来，形成归属感。社群是留存和裂变的双重引擎。

策略六：跨界合作。找到互补的合作伙伴，资源互换，实现 1+1>2 的效果。`
        };

        let currentSlides = [];
        let currentSlideIndex = 0;

        // 加载示例
        function loadExample(type) {
            document.getElementById('articleInput').value = examples[type];
        }

        // 模拟 AI 分析文章并生成课件
        function generateCourse() {
            const article = document.getElementById('articleInput').value.trim();
            const url = document.getElementById('urlInput').value.trim();

            if (!article && !url) {
                alert('请输入文章内容或链接');
                return;
            }

            // 显示加载动画
            document.getElementById('loading').classList.add('active');
            document.getElementById('generateBtn').disabled = true;

            // 模拟 AI 处理（实际项目中这里调用 AI API）
            setTimeout(() => {
                const content = article || '从链接获取的文章内容...';
                currentSlides = parseArticleToSlides(content);
                
                // 隐藏加载，显示课件
                document.getElementById('loading').classList.remove('active');
                document.getElementById('generateBtn').disabled = false;
                
                document.getElementById('inputPage').style.display = 'none';
                document.getElementById('coursePage').classList.add('active');
                
                renderSlide(0);
            }, 2000);
        }

        // 解析文章为课件幻灯片（这里是简化版，实际用 AI 分析）
        function parseArticleToSlides(article) {
            const lines = article.split('\n').filter(l => l.trim());
            const slides = [];
            
            // 提取标题
            const title = lines[0] || '文章核心要点';
            
            // 提取要点（以数字、第X、或者段落形式）
            let points = [];
            
            for (let line of lines.slice(1)) {
                // 匹配 "第一/第一步/策略一" 等格式
                const match = line.match(/^(第[一二三四五六七八九十]|策略|原则|步骤|要点|核心)[、，.:：\s]+(.+)$/);
                if (match) {
                    const fullText = match[2];
                    // 分割标题和描述
                    const parts = fullText.split(/[。；;]/);
                    const pointTitle = parts[0].trim();
                    const pointDesc = parts.slice(1).join('。').trim() || '这是该要点的详细说明，帮助理解核心概念。';
                    
                    points.push({
                        title: pointTitle,
                        desc: pointDesc
                    });
                }
            }
            
            // 如果没有识别到格式化的要点，按段落分割
            if (points.length === 0) {
                const paragraphs = lines.slice(1).filter(l => l.length > 10);
                points = paragraphs.slice(0, 6).map((p, i) => ({
                    title: p.slice(0, 30) + (p.length > 30 ? '...' : ''),
                    desc: p
                }));
            }
            
            // 生成封面
            slides.push({
                type: 'cover',
                title: title,
                subtitle: '核心要点提炼',
                content: `共提取 ${points.length} 个核心要点`,
                detail: '点击下方箭头开始学习',
                highlight: 'AI 自动生成'
            });
            
            // 生成内容页
            points.forEach((point, index) => {
                slides.push({
                    type: 'content',
                    title: title,
                    subtitle: `要点 ${index + 1}`,
                    content: point.title,
                    detail: point.desc,
                    highlight: '核心洞察'
                });
            });
            
            // 生成总结页
            slides.push({
                type: 'summary',
                title: '总结回顾',
                subtitle: '核心心法',
                content: points.map(p => p.title.split('，')[0]).join(' + '),
                detail: '掌握这些要点，付诸实践',
                highlight: '行动胜于一切'
            });
            
            return slides;
        }

        // 渲染幻灯片
        function renderSlide(index) {
            const slide = currentSlides[index];
            const container = document.getElementById('slideContainer');
            
            container.innerHTML = `
                <h1 class="slide-title">${slide.title}</h1>
                <div class="slide-card">
                    <span class="slide-badge">${slide.subtitle}</span>
                    <h2 class="slide-content">${slide.content}</h2>
                    <p class="slide-detail">${slide.detail}</p>
                    <span class="slide-highlight">${slide.highlight}</span>
                    <div class="pointer" style="top: 70%; right: 10%;">👆</div>
                </div>
            `;
            
            // 更新进度
            const total = currentSlides.length;
            const current = index + 1;
            document.getElementById('pageNumber').textContent = 
                `${String(current).padStart(2, '0')} / ${String(total).padStart(2, '0')}`;
            document.getElementById('progressFill').style.width = `${(current / total) * 100}%`;
            
            document.getElementById('prevBtn').disabled = index === 0;
            document.getElementById('nextBtn').disabled = index === total - 1;
        }

        function nextSlide() {
            if (currentSlideIndex < currentSlides.length - 1) {
                currentSlideIndex++;
                renderSlide(currentSlideIndex);
            }
        }

        function prevSlide() {
            if (currentSlideIndex > 0) {
                currentSlideIndex--;
                renderSlide(currentSlideIndex);
            }
        }

        function backToInput() {
            document.getElementById('coursePage').classList.remove('active');
            document.getElementById('inputPage').style.display = 'flex';
            currentSlideIndex = 0;
        }

        function exportCourse() {
            const courseData = {
                title: currentSlides[0]?.title || '课件',
                slides: currentSlides,
                createdAt: new Date().toISOString()
            };
            
            const blob = new Blob([JSON.stringify(courseData, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `课件_${courseData.title}.json`;
            a.click();
            URL.revokeObjectURL(url);
            
            alert('课件已导出！你可以保存这个文件，以后重新加载。');
        }

        // 键盘导航
        document.addEventListener('keydown', (e) => {
            if (!document.getElementById('coursePage').classList.contains('active')) return;
            
            if (e.key === 'ArrowDown' || e.key === ' ' || e.key === 'ArrowRight') {
                e.preventDefault();
                nextSlide();
            } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
                e.preventDefault();
                prevSlide();
            } else if (e.key === 'Escape') {
                backToInput();
            }
        });

        // 触摸滑动
        let touchStartY = 0;
        document.addEventListener('touchstart', (e) => {
            touchStartY = e.touches[0].clientY;
        });

        document.addEventListener('touchend', (e) => {
            if (!document.getElementById('coursePage').classList.contains('active')) return;
            
            const touchEndY = e.changedTouches[0].clientY;
            const diff = touchStartY - touchEndY;
            
            if (Math.abs(diff) > 50) {
                if (diff > 0) nextSlide();
                else prevSlide();
            }
        });
    </script>
</body>
</html>
