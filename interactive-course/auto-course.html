<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能课件</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #f8f9fa;
            min-height: 100vh;
            color: #333;
            overflow: hidden;
        }
        .page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px 40px 100px;
            opacity: 0;
            visibility: hidden;
            transition: all 0.5s ease;
            transform: translateX(50px);
        }
        .page.active {
            opacity: 1;
            visibility: visible;
            transform: translateX(0);
        }
        .page.prev {
            transform: translateX(-50px);
        }
        
        /* 卡片样式 */
        .card {
            background: #fff;
            border-radius: 20px;
            padding: 50px 60px;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            border: 1px solid rgba(0,0,0,0.06);
        }
        
        /* 标题 */
        .main-title {
            font-size: 2.2rem;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 40px;
            text-align: center;
            line-height: 1.4;
        }
        
        /* 副标题/标签 */
        .badge {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 25px;
        }
        
        /* 内容 */
        .content-title {
            font-size: 1.6rem;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 20px;
            line-height: 1.5;
        }
        
        .content-text {
            font-size: 1.1rem;
            color: #555;
            line-height: 1.9;
            margin-bottom: 25px;
        }
        
        /* 要点列表 */
        .points {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
        .point {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            padding: 20px 25px;
            background: #f8f9fa;
            border-radius: 12px;
            border-left: 4px solid #667eea;
        }
        .point-num {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.9rem;
            flex-shrink: 0;
        }
        .point-text {
            font-size: 1.05rem;
            color: #444;
            line-height: 1.7;
        }
        
        /* 高亮框 */
        .highlight-box {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
            border: 1px solid rgba(102, 126, 234, 0.2);
            border-radius: 12px;
            padding: 20px 25px;
            margin-top: 10px;
        }
        .highlight-text {
            font-size: 1.1rem;
            color: #667eea;
            font-weight: 600;
            line-height: 1.7;
        }
        
        /* 底部控制栏 */
        .controls {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            padding: 25px 40px;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(0,0,0,0.06);
        }
        
        .nav-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid #e0e0e0;
            background: #fff;
            color: #667eea;
            font-size: 1.3rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .nav-btn:hover:not(:disabled) {
            border-color: #667eea;
            background: #667eea;
            color: #fff;
            transform: scale(1.05);
        }
        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            border-color: #e0e0e0;
            color: #ccc;
        }
        
        .progress-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            min-width: 150px;
        }
        .page-indicator {
            font-size: 0.95rem;
            font-weight: 600;
            color: #667eea;
        }
        .progress-bar {
            width: 100%;
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 2px;
            transition: width 0.4s ease;
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .page { padding: 40px 20px 90px; }
            .card { padding: 30px 25px; border-radius: 16px; }
            .main-title { font-size: 1.6rem; margin-bottom: 25px; }
            .content-title { font-size: 1.3rem; }
            .content-text { font-size: 1rem; }
            .point { padding: 15px 18px; }
            .controls { padding: 20px; gap: 20px; }
        }
    </style>
</head>
<body>
    <!-- 页面容器 -->
    <div id="slides-container"></div>
    
    <!-- 控制栏 -->
    <div class="controls">
        <button class="nav-btn" id="prevBtn" onclick="prevSlide()">↑</button>
        <div class="progress-section">
            <span class="page-indicator" id="pageIndicator">1 / 5</span>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 20%"></div>
            </div>
        </div>
        <button class="nav-btn" id="nextBtn" onclick="nextSlide()">↓</button>
    </div>

    <script>
        // ==================== 在这里粘贴你的文本 ====================
        const inputText = `在这里粘贴你的文章/总结/知识点...

系统会自动：
1. 提取主标题
2. 识别核心要点
3. 分成3-6页幻灯片
4. 高亮重点句子
5. 生成结论页

格式示例：
第一，找到真正的痛点。深入用户场景...
第二，快速验证假设。用MVP测试...
第三，控制烧钱速度。现金流是生命线...`;
        // =========================================================

        let slides = [];
        let currentSlide = 0;

        function parseContent(text) {
            const lines = text.split('\n').filter(l => l.trim());
            const title = lines[0] || '智能课件';
            const points = [];
            
            for (let line of lines.slice(1)) {
                const match = line.match(/^(第[一二三四五六七八九十]|策略|原则|步骤|要点|核心|方法|技巧)[、，.:：\s]+(.+)$/);
                if (match) {
                    const parts = match[2].split(/[。；;]/);
                    points.push({
                        num: points.length + 1,
                        title: parts[0].trim(),
                        desc: parts.slice(1).join('。').trim()
                    });
                }
            }
            
            // 如果没识别到格式，按段落分
            if (points.length === 0) {
                const paragraphs = lines.slice(1).filter(l => l.length > 15);
                for (let i = 0; i < Math.min(paragraphs.length, 6); i++) {
                    points.push({
                        num: i + 1,
                        title: paragraphs[i].slice(0, 40) + (paragraphs[i].length > 40 ? '...' : ''),
                        desc: ''
                    });
                }
            }
            
            return { title, points };
        }

        function generateSlides(data) {
            const slides = [];
            const { title, points } = data;
            
            // 封面
            slides.push({
                type: 'cover',
                html: `
                    <div class="card" style="text-align: center;">
                        <div class="badge">智能课件</div>
                        <h1 class="main-title">${title}</h1>
                        <p style="color: #888; font-size: 1.1rem;">共 ${points.length} 个核心要点</p>
                        <div class="highlight-box" style="margin-top: 30px;">
                            <div class="highlight-text">点击下方箭头或按 ↓ 键开始学习</div>
                        </div>
                    </div>
                `
            });
            
            // 内容页 - 每页2个要点
            for (let i = 0; i < points.length; i += 2) {
                const pagePoints = points.slice(i, i + 2);
                slides.push({
                    type: 'content',
                    html: `
                        <div class="card">
                            <div style="text-align: center; margin-bottom: 30px;">
                                <span class="badge">核心要点 ${i + 1}-${Math.min(i + 2, points.length)}</span>
                            </div>
                            <div class="points">
                                ${pagePoints.map(p => `
                                    <div class="point">
                                        <div class="point-num">${p.num}</div>
                                        <div>
                                            <div style="font-weight: 600; color: #1a1a2e; margin-bottom: 8px; font-size: 1.15rem;">${p.title}</div>
                                            ${p.desc ? `<div style="color: #666; font-size: 0.95rem; line-height: 1.6;">${p.desc}</div>` : ''}
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `
                });
            }
            
            // 结论页
            const keyPoints = points.slice(0, 3).map(p => p.title.split('，')[0]).join(' → ');
            slides.push({
                type: 'summary',
                html: `
                    <div class="card" style="text-align: center;">
                        <div class="badge">总结回顾</div>
                        <h1 class="main-title" style="font-size: 1.8rem;">核心脉络</h1>
                        <div class="highlight-box" style="margin: 30px 0;">
                            <div class="highlight-text">${keyPoints}</div>
                        </div>
                        <p style="color: #666; font-size: 1.1rem; line-height: 1.8;">
                            掌握这些要点，付诸实践<br>
                            <span style="color: #667eea; font-weight: 600;">行动胜于一切</span>
                        </p>
                    </div>
                `
            });
            
            return slides;
        }

        function renderSlides() {
            const container = document.getElementById('slides-container');
            container.innerHTML = slides.map((slide, i) => `
                <div class="page ${i === 0 ? 'active' : ''}" data-index="${i}">
                    ${slide.html}
                </div>
            `).join('');
            updateControls();
        }

        function updateControls() {
            document.getElementById('pageIndicator').textContent = `${currentSlide + 1} / ${slides.length}`;
            document.getElementById('progressFill').style.width = `${((currentSlide + 1) / slides.length) * 100}%`;
            document.getElementById('prevBtn').disabled = currentSlide === 0;
            document.getElementById('nextBtn').disabled = currentSlide === slides.length - 1;
            
            document.querySelectorAll('.page').forEach((page, i) => {
                page.classList.remove('active', 'prev');
                if (i === currentSlide) page.classList.add('active');
                else if (i < currentSlide) page.classList.add('prev');
            });
        }

        function nextSlide() {
            if (currentSlide < slides.length - 1) {
                currentSlide++;
                updateControls();
            }
        }

        function prevSlide() {
            if (currentSlide > 0) {
                currentSlide--;
                updateControls();
            }
        }

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowDown' || e.key === ' ' || e.key === 'ArrowRight') {
                e.preventDefault();
                nextSlide();
            } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
                e.preventDefault();
                prevSlide();
            }
        });

        // 触摸滑动
        let touchStartY = 0;
        document.addEventListener('touchstart', (e) => { touchStartY = e.touches[0].clientY; });
        document.addEventListener('touchend', (e) => {
            const touchEndY = e.changedTouches[0].clientY;
            const diff = touchStartY - touchEndY;
            if (Math.abs(diff) > 50) {
                if (diff > 0) nextSlide();
                else prevSlide();
            }
        });

        // 初始化
        const data = parseContent(inputText);
        slides = generateSlides(data);
        renderSlides();
    </script>
</body>
</html>
