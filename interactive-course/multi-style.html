<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI课件生成器 - 5种风格</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif; background: #0f0f1a; min-height: 100vh; color: #fff; }
        .input-page { min-height: 100vh; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }
        .input-title { font-size: 2.2rem; font-weight: 700; background: linear-gradient(90deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; text-align: center; }
        .input-subtitle { color: rgba(255,255,255,0.5); margin-bottom: 30px; text-align: center; }
        .type-selector { display: flex; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; justify-content: center; }
        .type-card { padding: 15px 20px; background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.1); border-radius: 12px; cursor: pointer; transition: all 0.3s; text-align: center; min-width: 100px; }
        .type-card:hover { background: rgba(255,255,255,0.1); }
        .type-card.active { border-color: #667eea; background: rgba(102, 126, 234, 0.15); }
        .type-icon { font-size: 1.8rem; margin-bottom: 5px; }
        .type-name { font-weight: 600; font-size: 0.85rem; }
        .type-desc { font-size: 0.65rem; color: rgba(255,255,255,0.5); }
        .input-box { max-width: 700px; width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 20px; margin-bottom: 15px; }
        textarea { width: 100%; min-height: 150px; background: transparent; border: none; color: #fff; font-size: 1rem; line-height: 1.8; resize: vertical; outline: none; }
        textarea::placeholder { color: rgba(255,255,255,0.3); }
        .generate-btn { max-width: 700px; width: 100%; padding: 16px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; border-radius: 12px; color: #fff; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .generate-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3); }
        .examples { margin-top: 25px; max-width: 700px; width: 100%; }
        .examples-title { font-size: 0.8rem; color: rgba(255,255,255,0.4); margin-bottom: 10px; }
        .example-tags { display: flex; flex-wrap: wrap; gap: 8px; }
        .example-tag { padding: 6px 14px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; font-size: 0.8rem; color: rgba(255,255,255,0.6); cursor: pointer; transition: all 0.3s; }
        .example-tag:hover { background: rgba(102, 126, 234, 0.2); border-color: #667eea; }
        .course-page { display: none; min-height: 100vh; flex-direction: column; }
        .course-page.active { display: flex; }
        .course-header { padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .header-btn { padding: 8px 16px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; color: #fff; cursor: pointer; font-size: 0.9rem; }
        .course-main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 30px; }
        .course-footer { display: flex; align-items: center; justify-content: center; gap: 30px; padding: 20px 30px; border-top: 1px solid rgba(255,255,255,0.1); }
        .nav-btn { width: 50px; height: 50px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); color: #fff; font-size: 1.3rem; cursor: pointer; transition: all 0.3s; }
        .nav-btn:hover:not(:disabled) { background: rgba(255,255,255,0.1); }
        .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .progress-section { display: flex; flex-direction: column; align-items: center; gap: 8px; min-width: 150px; }
        .page-number { font-size: 1rem; font-weight: 600; color: #667eea; }
        .progress-bar { width: 100%; height: 4px; background: rgba(255,255,255,0.15); border-radius: 2px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #667eea 0%, #764ba2 100%); border-radius: 2px; transition: width 0.4s ease; }
        /* ===== 5种样式 ===== */
        .style-formula .slide-container { max-width: 800px; width: 100%; text-align: center; }
        .style-formula .slide-title { font-size: 1.8rem; font-weight: 700; margin-bottom: 30px; background: linear-gradient(90deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .style-formula .slide-card { background: rgba(255,255,255,0.08); backdrop-filter: blur(20px); border-radius: 20px; padding: 40px 50px; border: 1px solid rgba(255,255,255,0.15); position: relative; }
        .style-formula .slide-badge { position: absolute; top: -12px; left: 30px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 6px 20px; border-radius: 15px; font-size: 0.85rem; font-weight: 600; }
        .style-formula .slide-content { font-size: 1.5rem; font-weight: 600; margin: 15px 0 20px; }
        .style-formula .slide-detail { font-size: 1rem; color: rgba(255,255,255,0.7); line-height: 1.7; }
        .style-formula .slide-highlight { display: inline-block; background: linear-gradient(90deg, rgba(102, 126, 234, 0.3) 0%, rgba(118, 75, 162, 0.3) 100%); padding: 6px 14px; border-radius: 8px; margin-top: 15px; font-weight: 500; font-size: 0.95rem; }
        
        .style-timeline .slide-container { max-width: 900px; width: 100%; }
        .style-timeline .slide-title { font-size: 1.6rem; text-align: center; margin-bottom: 40px; background: linear-gradient(90deg, #f093fb 0%, #f5576c 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .timeline-container { display: flex; align-items: flex-start; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .timeline-item { text-align: center; width: 140px; }
        .timeline-dot { width: 45px; height: 45px; border-radius: 50%; background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); display: flex; align-items: center; justify-content: center; font-size: 1.1rem; font-weight: 700; margin: 0 auto 12px; }
        .timeline-item.active .timeline-dot { transform: scale(1.15); box-shadow: 0 8px 25px rgba(245, 87, 108, 0.4); }
        .timeline-content { background: rgba(255,255,255,0.08); border-radius: 10px; padding: 12px; border: 1px solid rgba(255,255,255,0.1); font-size: 0.85rem; }
        .timeline-item:not(.active) { opacity: 0.4; }
        .timeline-step { font-size: 0.75rem; color: #f5576c; margin-bottom: 4px; }
        .timeline-title { font-weight: 600; }
        
        .style-mindmap .slide-container { max-width: 800px; width: 100%; text-align: center; }
        .style-mindmap .slide-title { font-size: 1.6rem; margin-bottom: 30px; background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .mindmap-container { position: relative; height: 300px; display: flex; align-items: center; justify-content: center; }
        .mindmap-center { width: 130px; height: 130px; border-radius: 50%; background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); display: flex; align-items: center; justify-content: center; font-size: 1rem; font-weight: 700; box-shadow: 0 12px 35px rgba(79, 172, 254, 0.4); z-index: 10; padding: 15px; }
        .mindmap-branch { position: absolute; background: rgba(255,255,255,0.1); border: 1px solid rgba(79, 172, 254, 0.3); border-radius: 10px; padding: 12px 16px; max-width: 160px; font-size: 0.85rem; }
        .mindmap-branch.active { background: rgba(79, 172, 254, 0.25); border-color: #4facfe; box-shadow: 0 5px 20px rgba(79, 172, 254, 0.2); }
        .mindmap-branch.pos-1 { top: 5%; left: 5%; } .mindmap-branch.pos-2 { top: 5%; right: 5%; }
        .mindmap-branch.pos-3 { bottom: 5%; left: 5%; } .mindmap-branch.pos-4 { bottom: 5%; right: 5%; }
        .mindmap-branch.pos-5 { top: 50%; left: 2%; transform: translateY(-50%); }
        .mindmap-branch.pos-6 { top: 50%; right: 2%; transform: translateY(-50%); }
        .branch-number { display: inline-block; width: 22px; height: 22px; border-radius: 50%; background: #4facfe; font-size: 0.75rem; font-weight: 700; line-height: 22px; margin-bottom: 4px; }
        
        .style-compare .slide-container { max-width: 800px; width: 100%; }
        .style-compare .slide-title { font-size: 1.6rem; text-align: center; margin-bottom: 30px; background: linear-gradient(90deg, #fa709a 0%, #fee140 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .compare-container { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; position: relative; }
        .compare-card { background: rgba(255,255,255,0.05); border-radius: 16px; padding: 25px; border: 2px solid transparent; }
        .compare-card.left { border-color: rgba(250, 112, 154, 0.3); }
        .compare-card.left.active { background: rgba(250, 112, 154, 0.1); border-color: #fa709a; }
        .compare-card.right { border-color: rgba(254, 225, 64, 0.3); }
        .compare-card.right.active { background: rgba(254, 225, 64, 0.1); border-color: #fee140; }
        .compare-label { font-size: 0.75rem; padding: 4px 10px; border-radius: 12px; display: inline-block; margin-bottom: 12px; }
        .compare-card.left .compare-label { background: rgba(250, 112, 154, 0.2); color: #fa709a; }
        .compare-card.right .compare-label { background: rgba(254, 225, 64, 0.2); color: #fee140; }
        .compare-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 8px; }
        .compare-desc { color: rgba(255,255,255,0.7); font-size: 0.9rem; line-height: 1.5; }
        .compare-vs { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); width: 45px; height: 45px; border-radius: 50%; background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.9rem; }
        
        .style-quiz .slide-container { max-width: 600px; width: 100%; text-align: center; }
        .style-quiz .slide-title { font-size: 1.1rem; margin-bottom: 8px; color: rgba(255,255,255,0.6); }
        .quiz-progress { font-size: 0.85rem; color: #43e97b; margin-bottom: 25px; }
        .quiz-question { font-size: 1.3rem; font-weight: 600; margin-bottom: 25px; line-height: 1.4; }
        .quiz-options { display: flex; flex-direction: column; gap: 10px; }
        .quiz-option { background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 14px 18px; cursor: pointer; transition: all 0.3s; text-align: left; display: flex; align-items: center; gap: 12px; }
        .quiz-option:hover { border-color: rgba(67, 233, 123, 0.5); }
        .quiz-option.correct { background: rgba(67, 233, 123, 0.15); border-color: #43e97b; }
        .quiz-option.wrong { background: rgba(245, 87, 108, 0.15); border-color: #f5576c; }
        .option-letter { width: 30px; height: 30px; border-radius: 50%; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.85rem; flex-shrink: 0; }
        .option-text { font-size: 0.95rem; }
    </style>
</head>
<body>
    <div class="input-page" id="inputPage">
        <h1 class="input-title">AI课件生成器</h1>
        <p class="input-subtitle">选择风格，粘贴文章，自动生成精美课件</p>
        <div class="type-selector">
            <div class="type-card active" data-type="formula" onclick="selectType('formula')"><div class="type-icon">🎓</div><div class="type-name">公式型</div><div class="type-desc">方法论</div></div>
            <div class="type-card" data-type="timeline" onclick="selectType('timeline')"><div class="type-icon">📊</div><div class="type-name">时间线型</div><div class="type-desc">流程/历史</div></div>
            <div class="type-card" data-type="mindmap" onclick="selectType('mindmap')"><div class="type-icon">🧠</div><div class="type-name">思维导图</div><div class="type-desc">概念关系</div></div>
            <div class="type-card" data-type="compare" onclick="selectType('compare')"><div class="type-icon">⚖️</div><div class="type-name">对比型</div><div class="type-desc">优劣分析</div></div>
            <div class="type-card" data-type="quiz" onclick="selectType('quiz')"><div class="type-icon">🎮</div><div class="type-name">问答型</div><div class="type-desc">测试复习</div></div>
        </div>
        <div class="input-box"><textarea id="articleInput" placeholder="在这里粘贴文章内容...

格式示例：
第一，找到真正的痛点。深入用户场景...
第二，快速验证假设。用MVP测试...
第三，控制烧钱速度。现金流是生命线...

AI会自动识别「第一/第二/策略/步骤」等结构"></textarea></div>
        <button class="generate-btn" onclick="generateCourse()">✨ 生成课件</button>
        <div class="examples">
            <p class="examples-title">💡 快速体验：</p>
            <div class="example-tags">
                <span class="example-tag" onclick="loadExample('startup')">📊 创业法则</span>
                <span class="example-tag" onclick="loadExample('product')">🚀 产品设计</span>
                <span class="example-tag" onclick="loadExample('ai')">🤖 AI指南</span>
                <span class="example-tag" onclick="loadExample('marketing')">📈 增长策略</span>
                <span class="example-tag" onclick="loadExample('history')">📜 互联网史</span>
            </div>
        </div>
    </div>
    <div class="course-page" id="coursePage">
        <header class="course-header">
            <button class="header-btn" onclick="backToInput()">← 返回</button>
            <div id="currentStyle">🎓 公式型课件</div>
            <button class="header-btn" onclick="changeStyle()">🎨 换风格</button>
        </header>
        <main class="course-main"><div class="slide-container" id="slideContainer"></div></main>
        <footer class="course-footer">
            <button class="nav-btn" id="prevBtn" onclick="prevSlide()">↑</button>
            <div class="progress-section">
                <span class="page-number" id="pageNumber">01 / 05</span>
                <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width: 20%"></div></div>
            </div>
            <button class="nav-btn" id="nextBtn" onclick="nextSlide()">↓</button>
        </footer>
    </div>
    <script>
        const examples = {
            startup: `创业公司的五大生存法则

第一，找到真正的痛点。很多创业者失败是因为解决了一个不存在的问题。你需要深入用户场景，找到他们愿意付费解决的痛点。

第二，快速验证假设。不要花一年时间去开发一个完美的产品。用两周时间做出MVP，快速投放市场测试，根据反馈迭代。

第三，控制烧钱速度。现金流是创业公司的生命线。在找到盈利模式之前，保持精简团队，把每一分钱花在刀刃上。

第四，组建互补团队。技术、产品、运营，三个人缺一不可。找比你更强的人加入，而不是找听话的人。

第五，保持战略定力。市场会有波动，竞争对手会有动作，但你要坚持自己的核心判断，不被噪音干扰。`,

            product: `产品设计的五个核心原则

原则一：用户至上。所有设计决策都要以用户需求为出发点，而不是技术可行性或老板喜好。

原则二：简洁至上。功能不是越多越好。砍掉80%的功能，专注于把核心功能做到极致。

原则三：快速迭代。不要追求一步到位。小步快跑，持续收集用户反馈，不断优化体验。

原则四：数据驱动。用数据说话，而不是凭感觉。A/B测试是验证假设的最佳方式。

原则五：情感化设计。好的产品不仅好用，还要让用户感到愉悦。细节决定成败。`,

            ai: `AI时代的生存指南

第一步：拥抱变化。AI不会取代人类，但会用AI的人会取代不会用AI的人。保持学习心态。

第二步：找到结合点。思考AI如何赋能你的工作。是提升效率？还是创造新可能？

第三步：提示工程。学会和AI对话是一门艺术。清晰的指令、恰当的上下文、持续的迭代。

第四步：人机协作。把重复性工作交给AI，把创造性工作留给自己。发挥各自优势。

第五步：持续进化。AI技术日新月异。保持好奇心，持续学习新工具、新方法。`,

            marketing: `增长黑客的六大策略

策略一：病毒传播。设计分享机制，让用户成为你的传播者。Dropbox的邀请奖励是经典案例。

策略二：内容营销。持续输出有价值的内容，建立行业影响力。长期主义，复利效应。

策略三：产品驱动增长。产品本身就是最好的营销。让用户体验到「啊哈时刻」。

策略四：数据优化。建立完整的增长漏斗，用数据找到瓶颈，持续优化转化率。

策略五：社群运营。把用户聚集起来，形成归属感。社群是留存和裂变的双重引擎。

策略六：跨界合作。找到互补的合作伙伴，资源互换，实现1+1>2的效果。`,

            history: `互联网发展的五个阶段

第一阶段：门户时代（1995-2000）。以雅虎、新浪为代表，信息聚合是核心价值。

第二阶段：搜索时代（2000-2005）。Google、百度崛起，信息检索成为刚需。

第三阶段：社交时代（2005-2010）。Facebook、Twitter、QQ改变人与人的连接方式。

第四阶段：移动时代（2010-2020）。iPhone开启移动互联网，App生态爆发。

第五阶段：AI时代（2020-至今）。ChatGPT引领新一轮技术革命，智能化成为主题。`
        };

        let currentType = 'formula';
        let currentSlides = [];
        let currentSlideIndex = 0;

        const typeNames = {
            formula: '🎓 公式型课件',
            timeline: '📊 时间线型课件',
            mindmap: '🧠 思维导图课件',
            compare: '⚖️ 对比型课件',
            quiz: '🎮 问答型课件'
        };

        function selectType(type) {
            currentType = type;
            document.querySelectorAll('.type-card').forEach(c => c.classList.remove('active'));
            document.querySelector(`[data-type="${type}"]`).classList.add('active');
        }

        function loadExample(type) {
            document.getElementById('articleInput').value = examples[type];
        }

        function parseArticle(article) {
            const lines = article.split('\n').filter(l => l.trim());
            const points = [];
            for (let line of lines.slice(1)) {
                const match = line.match(/^(第[一二三四五六七八九十]|策略|原则|步骤|要点|核心|阶段)[、，.:：\s]+(.+)$/);
                if (match) {
                    const parts = match[2].split(/[。；;]/);
                    points.push({ title: parts[0].trim(), desc: parts.slice(1).join('。').trim() || '详细说明...' });
                }
            }
            if (points.length === 0) {
                const paragraphs = lines.slice(1).filter(l => l.length > 10);
                points.push(...paragraphs.slice(0, 6).map(p => ({ title: p.slice(0, 30) + (p.length > 30 ? '...' : ''), desc: p })));
            }
            return points;
        }

        function generateSlidesByType(points, title) {
            const slides = [];
            switch(currentType) {
                case 'formula':
                    slides.push({ type: 'cover', title, subtitle: '核心要点', content: `共 ${points.length} 个要点`, detail: '点击下方开始学习', highlight: 'AI生成' });
                    points.forEach((p, i) => slides.push({ type: 'content', title, subtitle: `要点 ${i+1}`, content: p.title, detail: p.desc, highlight: '核心洞察' }));
                    slides.push({ type: 'summary', title: '总结', subtitle: '核心心法', content: '掌握要点，付诸实践', detail: '行动胜于一切', highlight: '立即行动' });
                    break;
                case 'timeline':
                    slides.push({ type: 'cover', title, subtitle: '时间线', content: `${points.length} 个关键节点`, detail: '按时间顺序展开', highlight: '历史进程' });
                    points.forEach((p, i) => slides.push({ type: 'timeline', title, step: i+1, total: points.length, content: p.title, detail: p.desc }));
                    slides.push({ type: 'summary', title: '总结', subtitle: '发展脉络', content: '从起点到终点', detail: '每个阶段都是必经之路', highlight: '以史为鉴' });
                    break;
                case 'mindmap':
                    slides.push({ type: 'cover', title, subtitle: '思维导图', content: '中心主题发散', detail: '探索知识关联', highlight: '全局视野' });
                    points.forEach((p, i) => slides.push({ type: 'mindmap', title, center: title, branches: points, activeIndex: i }));
                    slides.push({ type: 'summary', title: '总结', subtitle: '知识网络', content: '点-线-面结合', detail: '建立系统性认知', highlight: '融会贯通' });
                    break;
                case 'compare':
                    slides.push({ type: 'cover', title, subtitle: '对比分析', content: '优劣权衡', detail: '理性决策依据', highlight: '辩证思维' });
                    for (let i = 0; i < points.length - 1; i += 2) {
                        slides.push({ type: 'compare', title, left: { title: points[i]?.title || '方案A', desc: points[i]?.desc || '' }, right: { title: points[i+1]?.title || '方案B', desc: points[i+1]?.desc || '' } });
                    }
                    slides.push({ type: 'summary', title: '总结', subtitle: '决策建议', content: '权衡利弊', detail: '选择最适合的方案', highlight: '明智决策' });
                    break;
                case 'quiz':
                    slides.push({ type: 'cover', title, subtitle: '知识测验', content: `${points.length} 道题目`, detail: '检验学习成果', highlight: '互动学习' });
                    points.forEach((p, i) => slides.push({ type: 'quiz', title: `问题 ${i+1}/${points.length}`, question: p.title, options: [{ letter: 'A', text: '这是正确的答案', correct: true }, { letter: 'B', text: p.desc.slice(0, 30) || '其他选项', correct: false }, { letter: 'C', text: '其他可能的选项', correct: false }, { letter: 'D', text: '另一个干扰项', correct: false }] }));
                    slides.push({ type: 'summary', title: '完成！', subtitle: '测验结束', content: '继续加油学习', detail: '温故知新', highlight: '再接再厉' });
                    break;
            }
            return slides;
        }

        function generateCourse() {
            const article = document.getElementById('articleInput').value.trim();
            if (!article) { alert('请输入文章内容'); return; }
            const points = parseArticle(article);
            if (points.length === 0) { alert('未能识别文章结构，请使用「第一/第二/策略/步骤」等格式'); return; }
            currentSlides = generateSlidesByType(points, article.split('\n')[0]);
            document.getElementById('inputPage').style.display = 'none';
            document.getElementById('coursePage').classList.add('active');
            document.getElementById('coursePage').className = `course-page active style-${currentType}`;
            document.getElementById('currentStyle').textContent = typeNames[currentType];
            currentSlideIndex = 0;
            renderSlide(0);
        }

        function renderSlide(index) {
            const slide = currentSlides[index];
            const container = document.getElementById('slideContainer');
            let html = '';
            switch(slide.type) {
                case 'cover':
                case 'summary':
                    html = `<h1 class="slide-title">${slide.title}</h1><div class="slide-card"><span class="slide-badge">${slide.subtitle}</span><h2 class="slide-content">${slide.content}</h2><p class="slide-detail">${slide.detail}</p><span class="slide-highlight">${slide.highlight}</span></div>`;
                    break;
                case 'content':
                    html = `<h1 class="slide-title">${slide.title}</h1><div class="slide-card"><span class="slide-badge">${slide.subtitle}</span><h2 class="slide-content">${slide.content}</h2><p class="slide-detail">${slide.detail}</p><span class="slide-highlight">${slide.highlight}</span></div>`;
                    break;
                case 'timeline':
                    html = `<h1 class="slide-title">${slide.title}</h1><div class="timeline-container">${currentSlides.filter(s => s.type === 'timeline').map((s, i) => `<div class="timeline-item ${i + 1 === slide.step ? 'active' : ''}"><div class="timeline-dot">${i + 1}</div><div class="timeline-content"><div class="timeline-step">步骤 ${i + 1}</div><div class="timeline-title">${i + 1 === slide.step ? s.content : '...'}</div></div></div>`).join('')}</div>`;
                    break;
                case 'mindmap':
                    html = `<h1 class="slide-title">${slide.title}</h1><div class="mindmap-container"><div class="mindmap-center">${slide.center}</div>${slide.branches.map((b, i) => `<div class="mindmap-branch pos-${i + 1} ${i === slide.activeIndex ? 'active' : ''}"><div class="branch-number">${i + 1}</div><div>${i === slide.activeIndex ? b.title : '...'}</div></div>`).join('')}</div>`;
                    break;
                case 'compare':
                    html = `<h1 class="slide-title">${slide.title}</h1><div class="compare-container"><div class="compare-card left active"><span class="compare-label">选项A</span><h3 class="compare-title">${slide.left.title}</h3><p class="compare-desc">${slide.left.desc}</p></div><div class="compare-vs">VS</div><div class="compare-card right"><span class="compare-label">选项B</span><h3 class="compare-title">${slide.right.title}</h3><p class="compare-desc">${slide.right.desc}</p></div></div>`;
                    break;
                case 'quiz':
                    html = `<div class="slide-title">${slide.title}</div><div class="quiz-progress">进度: ${slide.title.split('/')[0].replace('问题 ', '')} / ${slide.title.split('/')[1]}</div><div class="quiz-question">${slide.question}</div><div class="quiz-options">${slide.options.map(o => `<div class="quiz-option" onclick="this.classList.add('${o.correct ? 'correct' : 'wrong'}')"><div class="option-letter">${o.letter}</div><div class="option-text">${o.text}</div></div>`).join('')}</div>`;
                    break;
            }
            container.innerHTML = html;
            const total = currentSlides.length;
            const current = index + 1;
            document.getElementById('pageNumber').textContent = `${String(current).padStart(2, '0')} / ${String(total).padStart(2, '0')}`;
            document.getElementById('progressFill').style.width = `${(current / total) * 100}%`;
            document.getElementById('prevBtn').disabled = index === 0;
            document.getElementById('nextBtn').disabled = index === total - 1;
        }

        function nextSlide() { if (currentSlideIndex < currentSlides.length - 1) { currentSlideIndex++; renderSlide(currentSlideIndex); } }
        function prevSlide() { if (currentSlideIndex > 0) { currentSlideIndex--; renderSlide(currentSlideIndex); } }
        function backToInput() { document.getElementById('coursePage').classList.remove('active'); document.getElementById('inputPage').style.display = 'flex'; currentSlideIndex = 0; }
        function changeStyle() { backToInput(); }

        document.addEventListener('keydown', (e) => {
            if (!document.getElementById('coursePage').classList.contains('active')) return;
            if (e.key === 'ArrowDown' || e.key === ' ' || e.key === 'ArrowRight') { e.preventDefault(); nextSlide(); }
            else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') { e.preventDefault(); prevSlide(); }
            else if (e.key === 'Escape') { backToInput(); }
        });

        let touchStartY = 0;
        document.addEventListener('touchstart', (e) => { touchStartY = e.touches[0].clientY; });
        document.addEventListener('touchend', (e) => {
            if (!document.getElementById('coursePage').classList.contains('active')) return;
            const touchEndY = e.changedTouches[0].clientY;
            const diff = touchStartY - touchEndY;
            if (Math.abs(diff) > 50) { if (diff > 0) nextSlide(); else prevSlide(); }
        });
    </script>
</body>
</html>
