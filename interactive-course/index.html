<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>交互式课件 Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            overflow: hidden;
        }

        .container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 顶部标题栏 */
        .header {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: 600;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .menu-btn {
            width: 40px;
            height: 40px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        /* 主内容区 */
        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px 40px;
            position: relative;
        }

        .slide-container {
            max-width: 900px;
            width: 100%;
            text-align: center;
        }

        /* 标题动画 */
        .main-title {
            font-size: 2.8rem;
            font-weight: 700;
            margin-bottom: 50px;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.6s ease forwards;
        }

        /* 公式卡片 */
        .formula-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 50px 60px;
            border: 1px solid rgba(255,255,255,0.15);
            position: relative;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 0.6s ease 0.2s forwards;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.3);
        }

        .formula-badge {
            position: absolute;
            top: -15px;
            left: 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 8px 24px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .formula-title {
            font-size: 2.2rem;
            font-weight: 600;
            margin: 20px 0 25px;
            color: #fff;
        }

        .formula-desc {
            font-size: 1.1rem;
            color: rgba(255,255,255,0.7);
            line-height: 1.8;
        }

        .formula-highlight {
            display: inline-block;
            background: linear-gradient(90deg, rgba(102, 126, 234, 0.3) 0%, rgba(118, 75, 162, 0.3) 100%);
            padding: 4px 12px;
            border-radius: 6px;
            margin-top: 15px;
            font-weight: 500;
        }

        /* 指针动画 */
        .pointer {
            position: absolute;
            font-size: 3.5rem;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.4));
            animation: pointerBounce 1.5s ease-in-out infinite;
            z-index: 10;
        }

        @keyframes pointerBounce {
            0%, 100% { transform: translate(0, 0) rotate(-15deg); }
            50% { transform: translate(10px, -10px) rotate(-15deg); }
        }

        /* 底部控制栏 */
        .control-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            padding: 30px 40px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .nav-btn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-btn:hover:not(:disabled) {
            background: rgba(102, 126, 234, 0.2);
            border-color: #667eea;
            transform: scale(1.05);
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .progress-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            min-width: 200px;
        }

        .page-number {
            font-size: 1.1rem;
            font-weight: 600;
            color: #667eea;
            letter-spacing: 2px;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.15);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 2px;
            transition: width 0.4s ease;
        }

        /* 动画 */
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 切换动画类 */
        .slide-enter {
            animation: slideEnter 0.5s ease forwards;
        }

        @keyframes slideEnter {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .main-title {
                font-size: 1.8rem;
            }
            .formula-card {
                padding: 35px 25px;
            }
            .formula-title {
                font-size: 1.5rem;
            }
            .header {
                padding: 15px 20px;
            }
            .main-content {
                padding: 20px;
            }
        }

        /* 装饰元素 */
        .decoration {
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(102, 126, 234, 0.15) 0%, transparent 70%);
            pointer-events: none;
        }

        .decoration-1 {
            top: -100px;
            right: -100px;
        }

        .decoration-2 {
            bottom: -150px;
            left: -150px;
            background: radial-gradient(circle, rgba(118, 75, 162, 0.1) 0%, transparent 70%);
        }
    </style>
</head>
<body>
    <div class="decoration decoration-1"></div>
    <div class="decoration decoration-2"></div>
    
    <div class="container">
        <!-- 顶部 -->
        <header class="header">
            <div class="logo">📚 交互课件</div>
            <button class="menu-btn">☰</button>
        </header>

        <!-- 主内容 -->
        <main class="main-content">
            <div class="slide-container" id="slideContainer">
                <!-- 内容将通过 JS 动态插入 -->
            </div>
        </main>

        <!-- 底部控制 -->
        <footer class="control-bar">
            <button class="nav-btn" id="prevBtn" onclick="prevSlide()">↑</button>
            
            <div class="progress-section">
                <span class="page-number" id="pageNumber">01 / 07</span>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 14%"></div>
                </div>
            </div>
            
            <button class="nav-btn" id="nextBtn" onclick="nextSlide()">↓</button>
        </footer>
    </div>

    <script>
        // 课件数据
        const slides = [
            {
                id: 1,
                title: "死掉的项目怎么复活？",
                subtitle: "公式 1",
                content: "AI 替代人工运营",
                desc: "用 AI 工具替代重复性人工操作，",
                highlight: "把运营成本降到原来的 1/10",
                pointer: { top: '60%', left: '65%' }
            },
            {
                id: 2,
                title: "死掉的项目怎么复活？",
                subtitle: "公式 2",
                content: "Serverless 翻转成本",
                desc: "按需付费，零服务器闲置成本，",
                highlight: "启动成本从万元降到百元",
                pointer: { top: '55%', left: '70%' }
            },
            {
                id: 3,
                title: "死掉的项目怎么复活？",
                subtitle: "公式 3",
                content: "AI 生成个性化内容",
                desc: "千人千面的内容自动生产，",
                highlight: "内容产出效率提升 100 倍",
                pointer: { top: '58%', left: '68%' }
            },
            {
                id: 4,
                title: "死掉的项目怎么复活？",
                subtitle: "公式 4",
                content: "自动化获客系统",
                desc: "构建自动化的流量获取管道，",
                highlight: "获客成本降低 80%",
                pointer: { top: '62%', left: '72%' }
            },
            {
                id: 5,
                title: "死掉的项目怎么复活？",
                subtitle: "公式 5",
                content: "数据驱动决策",
                desc: "用数据代替直觉做判断，",
                highlight: "决策准确率提升 3 倍",
                pointer: { top: '56%', left: '66%' }
            },
            {
                id: 6,
                title: "死掉的项目怎么复活？",
                subtitle: "公式 6",
                content: "快速验证 MVP",
                desc: "最小成本验证商业模式，",
                highlight: "试错周期从月缩短到周",
                pointer: { top: '60%', left: '69%' }
            },
            {
                id: 7,
                title: "总结",
                subtitle: "核心心法",
                content: "降本 + 增效 + 快迭代",
                desc: "用 AI 和自动化重构业务，",
                highlight: "让死掉的项目重获新生",
                pointer: { top: '55%', left: '65%' }
            }
        ];

        let currentSlide = 0;

        function renderSlide(index) {
            const slide = slides[index];
            const container = document.getElementById('slideContainer');
            
            container.innerHTML = `
                <h1 class="main-title" style="animation: none; opacity: 0;">${slide.title}</h1>
                <div class="formula-card" style="animation: none; opacity: 0;">
                    <span class="formula-badge">${slide.subtitle}</span>
                    <h2 class="formula-title">${slide.content}</h2>
                    <p class="formula-desc">
                        ${slide.desc}
                        <span class="formula-highlight">${slide.highlight}</span>
                    </p>
                    <div class="pointer" style="top: ${slide.pointer.top}; left: ${slide.pointer.left};">👆</div>
                </div>
            `;

            // 触发动画
            setTimeout(() => {
                const title = container.querySelector('.main-title');
                const card = container.querySelector('.formula-card');
                
                title.style.animation = 'fadeInUp 0.6s ease forwards';
                card.style.animation = 'fadeInUp 0.6s ease 0.2s forwards';
            }, 50);

            // 更新进度
            updateProgress(index);
        }

        function updateProgress(index) {
            const total = slides.length;
            const current = index + 1;
            const percentage = (current / total) * 100;
            
            document.getElementById('pageNumber').textContent = 
                `${String(current).padStart(2, '0')} / ${String(total).padStart(2, '0')}`;
            document.getElementById('progressFill').style.width = `${percentage}%`;
            
            // 更新按钮状态
            document.getElementById('prevBtn').disabled = index === 0;
            document.getElementById('nextBtn').disabled = index === total - 1;
        }

        function nextSlide() {
            if (currentSlide < slides.length - 1) {
                currentSlide++;
                renderSlide(currentSlide);
            }
        }

        function prevSlide() {
            if (currentSlide > 0) {
                currentSlide--;
                renderSlide(currentSlide);
            }
        }

        // 键盘导航
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowDown' || e.key === ' ' || e.key === 'ArrowRight') {
                e.preventDefault();
                nextSlide();
            } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
                e.preventDefault();
                prevSlide();
            }
        });

        // 触摸滑动支持
        let touchStartY = 0;
        document.addEventListener('touchstart', (e) => {
            touchStartY = e.touches[0].clientY;
        });

        document.addEventListener('touchend', (e) => {
            const touchEndY = e.changedTouches[0].clientY;
            const diff = touchStartY - touchEndY;
            
            if (Math.abs(diff) > 50) {
                if (diff > 0) {
                    nextSlide();
                } else {
                    prevSlide();
                }
            }
        });

        // 初始化
        renderSlide(0);
    </script>
</body>
</html>
