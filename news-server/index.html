<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>财经新闻速览 - 历史查看</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .header p {
            color: #888;
            font-size: 1.1em;
        }
        
        /* 时间线 */
        .timeline {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 40px;
            flex-wrap: wrap;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            overflow-x: auto;
        }
        
        .timeline-item {
            padding: 10px 15px;
            background: rgba(0, 212, 255, 0.1);
            border: 2px solid rgba(0, 212, 255, 0.3);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
            position: relative;
        }
        
        .timeline-item:hover {
            background: rgba(0, 212, 255, 0.2);
            border-color: rgba(0, 212, 255, 0.6);
            transform: translateY(-2px);
        }
        
        .timeline-item.active {
            background: rgba(0, 212, 255, 0.3);
            border-color: #00d4ff;
            color: #00d4ff;
            font-weight: bold;
        }
        
        /* 控制按钮 */
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 10px 20px;
            background: rgba(0, 212, 255, 0.2);
            border: 2px solid rgba(0, 212, 255, 0.5);
            color: #00d4ff;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1em;
        }
        
        .btn:hover:not(:disabled) {
            background: rgba(0, 212, 255, 0.3);
            border-color: #00d4ff;
            transform: translateY(-2px);
        }
        
        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        
        /* 日期输入 */
        .date-input-group {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }
        
        .date-input-group input {
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(0, 212, 255, 0.3);
            color: #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
        }
        
        .date-input-group input:focus {
            outline: none;
            border-color: #00d4ff;
            background: rgba(0, 212, 255, 0.1);
        }
        
        /* 新闻内容 */
        .news-container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 30px;
            border: 1px solid rgba(0, 212, 255, 0.2);
        }
        
        .news-date {
            font-size: 1.3em;
            color: #00d4ff;
            margin-bottom: 10px;
            font-weight: bold;
        }
        
        .market-tone {
            color: #888;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(0, 212, 255, 0.05);
            border-left: 3px solid #00d4ff;
            border-radius: 5px;
        }
        
        .news-section {
            margin-bottom: 30px;
        }
        
        .section-title {
            font-size: 1.2em;
            color: #00d4ff;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(0, 212, 255, 0.3);
        }
        
        .news-item {
            background: rgba(0, 212, 255, 0.05);
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            border-left: 3px solid #00d4ff;
        }
        
        .news-title {
            font-size: 1.1em;
            color: #e0e0e0;
            margin-bottom: 8px;
            font-weight: bold;
        }
        
        .news-summary {
            color: #aaa;
            margin-bottom: 10px;
            line-height: 1.6;
        }
        
        .news-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            font-size: 0.9em;
            color: #888;
        }
        
        .meta-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        
        .meta-label {
            color: #666;
            font-size: 0.85em;
        }
        
        .meta-value {
            color: #00d4ff;
        }
        
        .etf-list, .stock-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .etf-tag, .stock-tag {
            padding: 5px 10px;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 5px;
            font-size: 0.9em;
        }
        
        /* 新格式样式：结论前置 */
        .wukong-judgment {
            background: rgba(76, 175, 80, 0.1);
            border: 2px solid rgba(76, 175, 80, 0.4);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .wukong-judgment h3 {
            color: #4CAF50;
            margin-bottom: 15px;
            font-size: 1.2em;
        }

        .wukong-item {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            color: #e0e0e0;
        }

        .wukong-label {
            color: #4CAF50;
            font-weight: bold;
            min-width: 80px;
        }

        /* 决策矩阵表格 */
        .decision-matrix {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            font-size: 0.9em;
        }

        .decision-matrix th {
            background: rgba(76, 175, 80, 0.2);
            color: #4CAF50;
            padding: 12px;
            text-align: left;
            border: 1px solid rgba(76, 175, 80, 0.3);
        }

        .decision-matrix td {
            padding: 10px 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ccc;
        }

        .decision-matrix tr:hover {
            background: rgba(76, 175, 80, 0.05);
        }

        .probability-high {
            color: #4CAF50;
            font-weight: bold;
        }

        .probability-medium {
            color: #FFC107;
            font-weight: bold;
        }

        .probability-low {
            color: #f44336;
            font-weight: bold;
        }

        .suggestion-good {
            color: #4CAF50;
            font-weight: bold;
        }

        .suggestion-caution {
            color: #FFC107;
            font-weight: bold;
        }

        .suggestion-bad {
            color: #f44336;
            font-weight: bold;
        }

        /* 八戒最终结论 */
        .bajie-conclusion {
            background: rgba(156, 39, 176, 0.1);
            border: 2px solid rgba(156, 39, 176, 0.4);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .bajie-conclusion h3 {
            color: #9C27B0;
            margin-bottom: 15px;
            font-size: 1.2em;
        }

        .conclusion-item {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            color: #e0e0e0;
        }

        .conclusion-label {
            color: #9C27B0;
            font-weight: bold;
            min-width: 100px;
        }

        /* 新闻项贝叶斯分析 */
        .bayes-analysis {
            background: rgba(255, 193, 7, 0.05);
            border: 1px solid rgba(255, 193, 7, 0.3);
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
        }

        .bayes-title {
            color: #FFC107;
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 1em;
        }

        .bayes-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85em;
        }

        .bayes-table th {
            background: rgba(255, 193, 7, 0.15);
            color: #FFC107;
            padding: 8px;
            text-align: left;
            border: 1px solid rgba(255, 193, 7, 0.3);
        }

        .bayes-table td {
            padding: 6px 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ccc;
        }

        .bayes-table .bayes-label {
            color: #888;
        }

        .bayes-table .bayes-value {
            color: #e0e0e0;
        }

        .bayes-table .bayes-highlight {
            color: #FFC107;
            font-weight: bold;
        }

        .bayes-table .bayes-prob {
            color: #4CAF50;
            font-weight: bold;
            font-size: 1.1em;
        }

        .bayes-table .bayes-profit {
            color: #ff4444;
            font-weight: bold;
        }

        .bayes-table .bayes-ci {
            color: #2196F3;
        }

        .bajie-label {
            font-size: 0.85em;
            color: #9C27B0;
            font-weight: bold;
        }

        .emoji-s {
            color: #f44336;
        }

        .emoji-a {
            color: #FFC107;
        }

        .emoji-douyin {
            color: #2196F3;
        }
        
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }
            
            .news-container {
                padding: 20px;
            }
            
            .timeline {
                gap: 8px;
            }
            
            .timeline-item {
                padding: 8px 12px;
                font-size: 0.9em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 财经新闻速览</h1>
            <p>实时财经新闻 · 历史查看 · 智能分类</p>
        </div>
        
        <div class="timeline" id="timeline"></div>
        
        <div class="controls">
            <button class="btn" id="prevBtn" onclick="showPreviousDate()">← 前一天</button>
            <button class="btn" id="todayBtn" onclick="showToday()">📅 今天</button>
            <button class="btn" id="nextBtn" onclick="showNextDate()">后一天 →</button>
            <button class="btn" onclick="toggleAllDates()">📋 查看所有日期</button>
        </div>
        
        <div class="date-input-group">
            <input type="text" id="dateInput" placeholder="输入日期 (YYYY-MM-DD)" onkeypress="handleDateInput(event)">
            <button class="btn" onclick="jumpToDate()">跳转</button>
        </div>
        
        <div class="news-container" id="newsContainer">
            <p style="text-align: center; color: #888;">加载中...</p>
        </div>
    </div>
    
    <script src="news-data.js"></script>
    <script>
        let currentDate = availableDates[0];
        
        function initTimeline() {
            const timeline = document.getElementById('timeline');
            timeline.innerHTML = '';
            
            availableDates.forEach(date => {
                const item = document.createElement('div');
                item.className = 'timeline-item' + (date === currentDate ? ' active' : '');
                item.textContent = date;
                item.onclick = () => showDate(date);
                timeline.appendChild(item);
            });
        }
        
        function showDate(date) {
            if (!availableDates.includes(date)) return;
            currentDate = date;
            updateUI();
        }
        
        function showPreviousDate() {
            const prev = getPreviousDate(currentDate);
            if (prev) showDate(prev);
        }
        
        function showNextDate() {
            const next = getNextDate(currentDate);
            if (next) showDate(next);
        }
        
        function showToday() {
            showDate(availableDates[0]);
        }
        
        function jumpToDate() {
            const input = document.getElementById('dateInput').value;
            if (availableDates.includes(input)) {
                showDate(input);
                document.getElementById('dateInput').value = '';
            } else {
                alert('日期不存在');
            }
        }
        
        function handleDateInput(event) {
            if (event.key === 'Enter') {
                jumpToDate();
            }
        }
        
        function toggleAllDates() {
            const dates = availableDates.join('\n');
            alert('可用日期:\n' + dates);
        }
        
        function updateUI() {
            initTimeline();
            updateButtons();
            renderNews();
        }
        
        function updateButtons() {
            document.getElementById('prevBtn').disabled = !getPreviousDate(currentDate);
            document.getElementById('nextBtn').disabled = !getNextDate(currentDate);
        }
        
        function renderNews() {
            const news = getNews(currentDate);
            if (!news) {
                document.getElementById('newsContainer').innerHTML = '<p style="text-align: center; color: #888;">该日期暂无新闻</p>';
                return;
            }
            
            // 收集所有新闻用于决策矩阵
            const allNews = [];
            if (news.s_level) allNews.push(...news.s_level.map(i => ({...i, level: 'S'})));
            if (news.a_level) allNews.push(...news.a_level.map(i => ({...i, level: 'A'})));
            if (news.douyin) allNews.push(...news.douyin.map(i => ({...i, level: '抖音'})));
            
            let html = `
                <div class="news-date">${news.date}</div>
                <div class="market-tone">📈 ${news.market_tone}</div>
            `;
            
            // 悟空今日判断
            if (news.wukong_judgment) {
                html += renderWukongJudgment(news.wukong_judgment);
            }
            
            // 决策矩阵
            if (allNews.length > 0) {
                html += renderDecisionMatrix(allNews);
            }
            
            // 八戒最终结论
            if (news.bajie_conclusion) {
                html += renderBajieConclusion(news.bajie_conclusion);
            }
            
            if (news.s_level && news.s_level.length > 0) {
                html += '<div class="news-section">';
                html += '<div class="section-title">🔴 S级新闻（主线级）</div>';
                news.s_level.forEach(item => {
                    html += renderNewsItem(item);
                });
                html += '</div>';
            }
            
            if (news.a_level && news.a_level.length > 0) {
                html += '<div class="news-section">';
                html += '<div class="section-title">🟡 A级新闻（轮动级）</div>';
                news.a_level.forEach(item => {
                    html += renderNewsItem(item);
                });
                html += '</div>';
            }
            
            if (news.douyin && news.douyin.length > 0) {
                html += '<div class="news-section">';
                html += '<div class="section-title">📱 抖音相关</div>';
                news.douyin.forEach(item => {
                    html += renderNewsItem(item);
                });
                html += '</div>';
            }
            
            document.getElementById('newsContainer').innerHTML = html;
        }
        
        function renderWukongJudgment(judgment) {
            let analysisHtml = '';
            if (judgment.core_analysis && judgment.core_analysis.length > 0) {
                analysisHtml = judgment.core_analysis.map(a => `<li>${a}</li>`).join('');
            }
            
            let opsHtml = '';
            if (judgment.operations && judgment.operations.length > 0) {
                opsHtml = judgment.operations.map(op => {
                    const emoji = op.type === '可做' ? '✅' : op.type === '警惕' ? '⚠️' : op.type === '回避' ? '❌' : '📌';
                    return `<div class="op-item">${emoji} ${op.content}</div>`;
                }).join('');
            }
            
            return `
                <div class="wukong-judgment">
                    <h3>📈 悟空今日判断</h3>
                    <div class="judgment-content">
                        <div class="judgment-item">
                            <span class="judgment-label">大盘情绪：</span>
                            <span>${judgment.market_sentiment || '暂无'}</span>
                        </div>
                        ${analysisHtml ? `<div class="judgment-item"><span class="judgment-label">核心分析：</span><ul>${analysisHtml}</ul></div>` : ''}
                        ${opsHtml ? `<div class="judgment-item"><span class="judgment-label">操作参考：</span><div class="op-list">${opsHtml}</div></div>` : ''}
                    </div>
                </div>
            `;
        }
        
        function renderDecisionMatrix(newsList) {
            const rows = newsList.map(item => {
                const bayes = item.bayes_analysis || {};
                const prob = bayes.posterior || 50;
                const profit = bayes.expected_return || '0%';
                const suggestion = prob >= 75 ? '✅' : prob >= 60 ? '✅' : prob >= 50 ? '⚠️' : prob >= 40 ? '⚠️' : '❌';
                const probClass = prob >= 75 ? 'probability-high' : prob >= 50 ? 'probability-medium' : 'probability-low';
                
                return `
                    <tr>
                        <td>${item.emoji} ${item.title.substring(0, 20)}...</td>
                        <td class="${probClass}">${prob}%</td>
                        <td>${profit}</td>
                        <td>${suggestion}</td>
                    </tr>
                `;
            }).join('');
            
            return `
                <div class="decision-matrix">
                    <h3>📊 决策矩阵</h3>
                    <table class="matrix-table">
                        <thead>
                            <tr>
                                <th>新闻</th>
                                <th>做多概率</th>
                                <th>预期收益</th>
                                <th>建议</th>
                            </tr>
                        </thead>
                        <tbody>${rows}</tbody>
                    </table>
                </div>
            `;
        }
        
        function renderBajieConclusion(conclusion) {
            return `
                <div class="bajie-conclusion">
                    <h3>🧠 八戒最终结论</h3>
                    <div class="conclusion-item">
                        <span class="conclusion-label">最优行动：</span>
                        <span>${conclusion.optimal_action || '观望'}</span>
                    </div>
                    <div class="conclusion-item">
                        <span class="conclusion-label">最优ETF组合：</span>
                        <span>${conclusion.optimal_etfs || '暂无'}</span>
                    </div>
                    <div class="conclusion-item">
                        <span class="conclusion-label">胜率：</span>
                        <span>${conclusion.win_rate || '50%'}</span>
                    </div>
                    <div class="conclusion-item">
                        <span class="conclusion-label">最大回撤警戒：</span>
                        <span>${conclusion.max_drawdown || '-5%'}</span>
                    </div>
                </div>
            `;
        }
        
        function renderNewsItem(item) {
            let etfHtml = '';
            if (item.etfs && item.etfs.length > 0) {
                etfHtml = '<div class="meta-item"><span class="meta-label">📈 映射ETF</span><div class="etf-list">';
                item.etfs.forEach(etf => {
                    const sentiment = etf.sentiment === '利好' ? 'sentiment-good' : 'sentiment-bad';
                    etfHtml += `<span class="etf-tag"><span class="${sentiment}">${etf.sentiment}</span> ${etf.name}</span>`;
                });
                etfHtml += '</div></div>';
            }
            
            let stockHtml = '';
            if (item.stocks && item.stocks.length > 0) {
                stockHtml = '<div class="meta-item"><span class="meta-label">✨ 映射个股</span><div class="stock-list">';
                item.stocks.forEach(stock => {
                    stockHtml += `<span class="stock-tag">${stock}</span>`;
                });
                stockHtml += '</div></div>';
            }
            
            // 贝叶斯分析
            let bayesHtml = '';
            if (item.bayes_analysis) {
                bayesHtml = renderBayesAnalysis(item.bayes_analysis);
            }
            
            return `
                <div class="news-item">
                    <div class="news-title">${item.emoji} ${item.title}</div>
                    <div class="news-summary">${item.summary}</div>
                    <div class="news-meta">
                        <div class="meta-item">
                            <span class="meta-label">⏱️ 影响时长</span>
                            <span class="meta-value">${item.duration}</span>
                        </div>
                        ${etfHtml}
                        ${stockHtml}
                        <div class="meta-item">
                            <span class="meta-label">💡 资金信号</span>
                            <span class="meta-value">${item.signal}</span>
                        </div>
                    </div>
                    ${bayesHtml}
                </div>
            `;
        }
        
        function renderBayesAnalysis(bayes) {
            return `
                <div class="bayes-analysis">
                    <div class="bayes-title">🧮 八戒贝叶斯分析</div>
                    <table class="bayes-table">
                        <tr>
                            <th>维度</th>
                            <th>判断</th>
                            <th>概率/数值</th>
                        </tr>
                        <tr>
                            <td class="bayes-label">先验（市场基准）</td>
                            <td class="bayes-value">${bayes.prior_judgment || '中性'}</td>
                            <td>${bayes.prior_prob || '50'}%</td>
                        </tr>
                        <tr>
                            <td class="bayes-label">似然（数据验证）</td>
                            <td class="bayes-value">${bayes.likelihood_judgment || '中性'}</td>
                            <td>${bayes.likelihood_prob || '50'}%</td>
                        </tr>
                        <tr>
                            <td class="bayes-label">后验（综合）</td>
                            <td class="bayes-value">做多概率</td>
                            <td class="bayes-prob">${bayes.posterior || '50'}%</td>
                        </tr>
                        <tr>
                            <td class="bayes-label">预期收益率</td>
                            <td class="bayes-value">ETF/个股</td>
                            <td class="bayes-profit">${bayes.expected_return || '0%'}</td>
                        </tr>
                        <tr>
                            <td class="bayes-label">置信区间</td>
                            <td class="bayes-value">95%CI</td>
                            <td class="bayes-ci">${bayes.confidence_interval || '[0%, 0%]'}</td>
                        </tr>
                    </table>
                    ${bayes.key_variables ? `<div class="bayes-keyvar">💡 关键变量：${bayes.key_variables}</div>` : ''}
                </div>
            `;
        }
        
        // 初始化
        initTimeline();
        updateButtons();
        renderNews();
    </script>
</body>
</html>
