<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>悟空财经分析 - 本地版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-start: #0d1117;
            --bg-end: #161b22;
            --green: #3fb950;
            --green-bg: rgba(63,185,80,0.12);
            --orange: #f0883e;
            --red: #f85149;
            --blue: #58a6ff;
            --gold: #d29922;
            --purple: #a371f7;
            --card-bg: rgba(255,255,255,0.04);
            --card-border: rgba(255,255,255,0.1);
            --text: #e6edf3;
            --text-dim: #8b949e;
            --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            font-family: var(--font);
            background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
            line-height: 1.7;
        }
        .container { max-width: 900px; margin: 0 auto; }

        /* ===== 页面切换导航 ===== */
        .page-nav {
            display: flex;
            justify-content: center;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 100;
            background: linear-gradient(135deg, #0d1117, #161b22);
            padding: 12px 0 8px;
            backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
        }
        .page-nav .page-btn {
            padding: 10px 20px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .page-nav .page-btn-timeline {
            background: rgba(63,185,80,0.15);
            border: 1px solid rgba(63,185,80,0.4);
            color: #3fb950;
        }
        .page-nav .page-btn-timeline:hover,
        .page-nav .page-btn-timeline.active {
            background: rgba(63,185,80,0.25);
            border-color: #3fb950;
            box-shadow: 0 0 12px rgba(63,185,80,0.3);
        }
        .page-nav .page-btn-review {
            background: rgba(255,193,7,0.1);
            border: 1px solid rgba(255,193,7,0.3);
            color: #d29922;
        }
        .page-nav .page-btn-review:hover {
            background: rgba(255,193,7,0.2);
            border-color: #d29922;
            box-shadow: 0 0 12px rgba(255,193,7,0.3);
        }

        /* ===== 标题 ===== */
        .header {
            text-align: center;
            margin-bottom: 32px;
            padding: 24px;
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px solid var(--card-border);
        }
        .header h1 {
            font-size: 26px;
            margin-bottom: 4px;
            background: linear-gradient(135deg, var(--green) 0%, var(--blue) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header .subtitle {
            font-size: 13px;
            color: var(--text-dim);
            margin-bottom: 8px;
            font-style: italic;
        }
        .header .date-tag {
            display: inline-block;
            margin-top: 10px;
            padding: 6px 14px;
            background: rgba(163,113,247,0.15);
            border: 1px solid rgba(163,113,247,0.3);
            border-radius: 8px;
            color: var(--purple);
            font-size: 13px;
        }

        /* ===== 导航 ===== */
        .nav-bar {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 28px;
            flex-wrap: wrap;
            padding: 14px;
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--card-border);
            align-items: center;
        }
        .date-btn {
            padding: 8px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 13px;
            color: var(--text-dim);
        }
        .date-btn:hover {
            background: rgba(63,185,80,0.1);
            border-color: var(--green);
            color: var(--green);
        }
        .date-btn.active {
            background: var(--green-bg);
            border-color: var(--green);
            color: var(--green);
            font-weight: 600;
        }
        /* 日期选择器 */
        .date-picker-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px;
        }
        .date-picker-wrap label {
            font-size: 13px;
            color: var(--text-dim);
        }
        .date-picker {
            padding: 8px 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: var(--text);
            font-size: 13px;
            cursor: pointer;
            outline: none;
            font-family: var(--font);
        }
        .date-picker:hover {
            border-color: var(--green);
        }
        .date-picker:focus {
            border-color: var(--green);
            box-shadow: 0 0 0 2px rgba(63,185,80,0.2);
        }
        /* 前一日/后一日按钮 */
        .nav-arrow-btn {
            padding: 8px 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 13px;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .nav-arrow-btn:hover:not(:disabled) {
            background: rgba(63,185,80,0.1);
            border-color: var(--green);
            color: var(--green);
        }
        .nav-arrow-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .nav-divider {
            width: 1px;
            height: 24px;
            background: rgba(255,255,255,0.1);
            margin: 0 4px;
        }

        /* ===== 区块通用 ===== */
        .section {
            background: var(--card-bg);
            border-radius: 14px;
            border: 1px solid var(--card-border);
            padding: 22px;
            margin-bottom: 24px;
        }
        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        /* ===== 今日基调 ===== */
        .tone-section {
            border: 2px solid var(--gold);
            background: linear-gradient(135deg, rgba(210,153,34,0.08) 0%, rgba(210,153,34,0.03) 100%);
        }
        .tone-section .section-title { color: var(--gold); }
        .tone-content {
            font-size: 15px;
            line-height: 1.8;
            color: var(--text);
        }
        .tone-item {
            margin-bottom: 12px;
            padding: 10px;
            background: rgba(0,0,0,0.15);
            border-radius: 6px;
        }
        .tone-label {
            font-weight: 600;
            color: var(--gold);
            margin-right: 8px;
        }

        /* ===== 悟空判断 ===== */
        .judgment-section { 
            background: linear-gradient(135deg, rgba(163,113,247,0.08) 0%, rgba(88,166,255,0.05) 100%);
            border-color: rgba(163,113,247,0.2);
        }
        .judgment-section .section-title { color: var(--purple); }
        
        /* ===== 八戒贝叶斯 ===== */
        .bayesian-section {
            background: linear-gradient(135deg, rgba(255,193,7,0.08) 0%, rgba(255,152,0,0.05) 100%);
            border-color: rgba(255,193,7,0.2);
        }
        .bayesian-section .section-title { color: #FFC107; }
        .overall-card {
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .overall-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 14px;
        }
        .stat-item {
            text-align: center;
            padding: 10px;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
        }
        .stat-label { font-size: 12px; color: var(--text-dim); }
        .stat-value { font-size: 18px; font-weight: 700; margin-top: 4px; }
        .stat-value.high { color: var(--green); }
        .stat-value.medium { color: #FFC107; }
        .stat-value.low { color: #f44336; }
        .overall-conclusion {
            font-size: 14px;
            line-height: 1.6;
            padding: 12px;
            background: rgba(255,193,7,0.08);
            border-radius: 8px;
            border-left: 3px solid #FFC107;
        }
        .decision-matrix {
            margin-top: 16px;
        }
        .matrix-title {
            font-size: 14px;
            font-weight: 600;
            color: #FFC107;
            margin-bottom: 12px;
        }
        .matrix-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .matrix-table th {
            text-align: left;
            padding: 8px;
            background: rgba(255,255,255,0.05);
            color: var(--text-dim);
            font-weight: 600;
        }
        .matrix-table td {
            padding: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .win-rate { font-weight: 600; }
        .win-rate.high { color: var(--green); }
        .win-rate.medium { color: #FFC107; }
        .win-rate.low { color: #f44336; }

        /* 贝叶斯推断卡片 */
        .bayes-analysis-list { margin-top: 16px; }
        .bayes-card {
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 12px;
        }
        .bayes-card-title {
            font-size: 14px;
            font-weight: 600;
            color: #FFC107;
            margin-bottom: 10px;
        }
        .bayes-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .bayes-table th {
            text-align: left;
            padding: 7px 8px;
            background: rgba(255,255,255,0.05);
            color: var(--text-dim);
            font-weight: 600;
        }
        .bayes-table td {
            padding: 7px 8px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .bayes-table .posterior-row td {
            border-top: 2px solid rgba(255,193,7,0.3);
            background: rgba(255,193,7,0.05);
        }
        .key-variable {
            margin-top: 10px;
            font-size: 13px;
            color: var(--text-dim);
            padding: 8px 12px;
            background: rgba(255,255,255,0.03);
            border-radius: 6px;
        }

        /* 八戒最终结论 */
        .bajie-conclusion {
            margin-top: 16px;
            background: linear-gradient(135deg, rgba(255,193,7,0.12) 0%, rgba(255,152,0,0.08) 100%);
            border: 1px solid rgba(255,193,7,0.3);
            border-radius: 10px;
            padding: 16px;
        }
        .bajie-conclusion-title {
            font-size: 15px;
            font-weight: 700;
            color: #FFC107;
            margin-bottom: 12px;
        }
        .bajie-conclusion-row {
            font-size: 14px;
            margin-bottom: 8px;
        }
        .bc-label {
            color: var(--text-dim);
            font-weight: 600;
        }

        /* ===== 沙僧韭菜直觉 ===== */
        .sangsha-section {
            margin-top: 16px;
            background: linear-gradient(135deg, rgba(156,39,176,0.12) 0%, rgba(103,58,183,0.08) 100%);
            border: 1px solid rgba(156,39,176,0.3);
            border-radius: 12px;
            padding: 16px;
        }
        .sangsha-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .sangsha-meta {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }
        .sg-meta-tag {
            font-size: 12px;
            color: #ce93d8;
            background: rgba(156,39,176,0.2);
            padding: 2px 8px;
            border-radius: 10px;
        }
        .sg-sentiment {
            font-size: 15px;
            font-weight: 700;
            color: #ce93d8;
        }
        .sg-advice {
            font-size: 13px;
            color: var(--text-dim);
        }
        .sangsha-stats {
            display: flex;
            gap: 20px;
            margin-bottom: 16px;
        }
        .sg-stat {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .stat-label {
            font-size: 12px;
            color: var(--text-dim);
            margin-bottom: 4px;
        }
        .stat-value {
            font-size: 20px;
            font-weight: 700;
        }
        .stat-value.buy { color: #ef5350; }
        .stat-value.panic { color: #ffa726; }
        .sangsha-top-news {
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            padding: 12px;
        }
        .sg-top-title {
            font-size: 13px;
            font-weight: 600;
            color: #ce93d8;
            margin-bottom: 12px;
        }
        .sg-news-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .sg-news-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        .sg-news-rank {
            width: 22px;
            height: 22px;
            background: linear-gradient(135deg, #ef5350, #e53935);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            color: white;
            margin-right: 10px;
            flex-shrink: 0;
        }
        .sg-news-content {
            flex: 1;
        }
        .sg-news-title {
            font-size: 13px;
            color: var(--text);
            margin-bottom: 4px;
        }
        .sg-news-meta {
            display: flex;
            gap: 12px;
            font-size: 12px;
        }
        .sg-buy-prob {
            color: #ef5350;
            font-weight: 600;
        }
        .sg-tags {
            color: var(--text-dim);
        }
        .sg-date {
            color: var(--text-dim);
            font-size: 11px;
        }

        /* ===== 唐憎最终仲裁 ===== */
        .tang-sanzang-section {
            margin-top: 16px;
            background: linear-gradient(135deg, rgba(255,193,7,0.08) 0%, rgba(255,152,0,0.06) 100%);
            border: 1px solid rgba(255,193,7,0.3);
            border-radius: 12px;
            padding: 16px;
        }
        .tang-position-banner {
            display: flex;
            gap: 12px;
            margin-bottom: 14px;
            align-items: center;
        }
        .ts-position {
            font-size: 15px;
            font-weight: 700;
            color: #FFC107;
            background: rgba(255,193,7,0.15);
            padding: 4px 10px;
            border-radius: 8px;
        }
        .ts-action {
            font-size: 15px;
            font-weight: 600;
            color: #FFD54F;
        }
        .tang-body {
            font-size: 13px;
            color: var(--text);
        }
        .ts-subtitle {
            font-weight: 700;
            color: #FFC107;
            margin: 8px 0 4px;
        }
        .ts-conflict-item {
            padding: 3px 0 3px 8px;
            color: #FFC107;
            font-size: 12px;
            border-left: 2px solid rgba(255,193,7,0.4);
            margin-bottom: 3px;
        }
        .ts-formula {
            margin-top: 10px;
            padding: 8px 10px;
            background: rgba(255,193,7,0.06);
            border-radius: 6px;
            font-size: 12px;
            color: #FFD54F;
            font-family: monospace;
        }
        .ts-risk-item {
            padding: 3px 0 3px 8px;
            color: #f44336;
            font-size: 12px;
            border-left: 2px solid rgba(244,67,54,0.5);
            margin-bottom: 3px;
        }
        .ts-conclusion {
            margin-top: 10px;
            padding: 8px 10px;
            background: rgba(76,175,80,0.1);
            border: 1px solid rgba(76,175,80,0.25);
            border-radius: 6px;
            font-size: 13px;
            color: #81C784;
        }

        /* ===== 白龙马主力行为 ===== */
        .white-dragon-section {
            margin-top: 16px;
            background: linear-gradient(135deg, rgba(33,150,243,0.12) 0%, rgba(25,118,210,0.08) 100%);
            border: 1px solid rgba(33,150,243,0.3);
            border-radius: 12px;
            padding: 16px;
        }
        .wd-main-state {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }
        .wd-label {
            font-size: 14px;
            color: var(--text-dim);
        }
        .wd-value {
            font-size: 16px;
            font-weight: 700;
        }
        .wd-stage {
            font-size: 13px;
            color: var(--text-dim);
        }
        .state-拉升 { color: var(--green); }
        .state-出货 { color: #ef5350; }
        .state-吸筹 { color: #29b6f6; }
        .state-洗盘 { color: #ffa726; }
        .state-分化 { color: #bdbdbd; }
        .state-观望 { color: var(--text-dim); }
        .wd-explain {
            font-size: 14px;
            color: var(--text);
            margin-bottom: 12px;
            padding: 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
        }
        .wd-using-retail {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            font-size: 14px;
        }
        .wd-using-retail.warning { color: #ef5350; }
        .wd-using-retail.normal { color: var(--green); }
        .wd-advice {
            font-size: 14px;
            font-weight: 600;
            color: #64b5f6;
            padding: 12px;
            background: rgba(33,150,243,0.15);
            border-radius: 8px;
        }

        .emotion-row {
            font-size: 14px;
            margin-bottom: 14px;
            padding-bottom: 14px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .emotion-label { color: var(--text-dim); }
        .emotion-value { 
            color: var(--green); 
            font-weight: 600;
        }
        .analysis-list {
            margin-bottom: 16px;
        }
        .analysis-item {
            position: relative;
            padding-left: 18px;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .analysis-item::before {
            content: '•';
            position: absolute;
            left: 0;
            color: var(--text-dim);
        }
        .strategy-box {
            background: linear-gradient(135deg, rgba(63,185,80,0.15) 0%, rgba(63,185,80,0.08) 100%);
            border: 1px solid rgba(63,185,80,0.3);
            border-radius: 10px;
            padding: 16px;
            margin-top: 8px;
        }
        .strategy-label {
            font-size: 13px;
            color: var(--green);
            font-weight: 600;
            margin-bottom: 10px;
        }
        .strategy-item {
            font-size: 14px;
            margin-bottom: 8px;
            line-height: 1.6;
        }

        /* ===== 新闻区块 ===== */
        .news-section.s-level .section-title { color: var(--red); }
        .news-section.a-level .section-title { color: var(--gold); }
        .news-section.douyin .section-title { color: var(--blue); }

        /* ===== 新闻卡片 ===== */
        .news-card {
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            border-left: 4px solid;
            padding: 18px;
            margin-bottom: 16px;
        }
        .s-level .news-card { border-left-color: var(--red); }
        .a-level .news-card { border-left-color: var(--gold); }
        .douyin .news-card { border-left-color: var(--blue); }

        .news-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 12px;
        }
        .news-title {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            flex: 1;
        }
        .news-source {
            padding: 4px 10px;
            background: rgba(255,255,255,0.06);
            border-radius: 6px;
            font-size: 11px;
            color: var(--text-dim);
        }
        .news-row {
            margin: 10px 0;
            font-size: 14px;
        }
        .label { 
            color: var(--text-dim); 
            margin-right: 6px;
            font-size: 13px;
        }

        /* ===== 映射标签 ===== */
        .mapping-section {
            margin-top: 14px;
        }
        .mapping-row {
            margin-bottom: 12px;
        }
        .mapping-label {
            font-size: 13px;
            color: var(--text-dim);
            margin-bottom: 8px;
        }
        .tags-wrap {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .tag-item {
            display: inline-flex;
            align-items: center;
            gap: 0;
            padding: 0;
            border-radius: 6px;
            overflow: hidden;
            font-size: 12px;
            border: 1px solid rgba(255,255,255,0.15);
            transition: all 0.2s;
        }
        .tag-item:hover {
            transform: translateY(-1px);
            border-color: rgba(255,255,255,0.3);
        }
        .tag-sentiment {
            padding: 5px 8px;
            font-weight: 700;
            font-size: 11px;
        }
        .tag-sentiment.bullish { background: var(--red); color: #fff; }
        .tag-sentiment.bearish { background: var(--green); color: #fff; }
        .tag-sentiment.neutral { background: #6e7681; color: #fff; }
        .tag-sentiment.watch { background: var(--blue); color: #fff; }
        .tag-sentiment.avoid { background: var(--orange); color: #fff; }
        .tag-name {
            padding: 5px 10px;
            color: var(--text);
        }
        .tag-note {
            padding: 5px 8px;
            color: var(--text-dim);
            font-size: 11px;
            background: rgba(255,255,255,0.03);
        }

        /* ===== 警告提示 ===== */
        .warning-box {

            // 从每条新闻的 bayes_analysis 构建 bajie_bayesian 结构（兼容新旧数据格式）
            function buildBajieBayesian(data) {
                const allNews = [].concat(data.s_level || [], data.a_level || [], data.douyin || []);
                const newsAnalysis = [];
                const decisionMatrix = [];
                allNews.forEach(item => {
                    const ba = item.bayes_analysis;

                        const wr = ba.posterior || 50;
                        const action = wr >= 65 ? '✅ 坚定做多' : wr >= 50 ? '⚠️ 轻仓' : '❌ 回避';
                        decisionMatrix.push({

                            win_rate: wr,
                            expected_return: ba.expected_return || 'N/A',
                            risk_ratio: wr >= 65 ? '1:3' : wr >= 50 ? '1:2' : '1:1',
                            action: action
                        });
                    }
                });
                if (newsAnalysis.length === 0) return null;
                return { news_analysis: newsAnalysis, decision_matrix: decisionMatrix };

            // 智能匹配新闻和贝叶斯分析
            function findBayesForNews(newsTitle, newsAnalysisList, decisionMatrix) {
                if (!newsAnalysisList) return null;
                
                // 1. 精确匹配
                const exact = newsAnalysisList.find(na => na.news_title === newsTitle);
                if (exact) return exact;
                
                // 2. 核心概念匹配（提取2-4字的核心概念进行匹配）
                const titlePrefix = newsTitle.replace(/[：:].*$/, '');
                const coreConcepts = [];
                
                // 提取常见财经概念词
                const conceptPatterns = ['原油', '黄金', '美股', 'AI芯片', '芯片', 'CPO', '光模块', 'A股', '央行', '油气', '科技', '存储', '新能源', '锂电', '光伏', '医药', '银行', '地产'];
                conceptPatterns.forEach(concept => {
                    if (titlePrefix.includes(concept)) {
                        coreConcepts.push(concept);
                    }
                });
                
                // 按概念匹配
                for (const na of newsAnalysisList) {
                    for (const concept of coreConcepts) {
                        if (na.news_title.includes(concept)) {
                            return na;
                        }
                    }
                }
                
                // 3. 反向包含匹配
                for (const na of newsAnalysisList) {
                    if (newsTitle.includes(na.news_title) || na.news_title.includes(newsTitle.substring(0, 10))) {
                        return na;
                    }
                }

                // 4. 决策矩阵匹配
                if (decisionMatrix) {
                    for (const dm of decisionMatrix) {
                        // 检查决策矩阵的新闻名称是否在新闻标题中
                        if (newsTitle.includes(dm.news) || 
                            (dm.news.length > 4 && titlePrefix.includes(dm.news.substring(0, 6)))) {
                            const matched = newsAnalysisList.find(na => na.news_title === dm.news);
                            if (matched) return matched;
                        }
                        // 检查核心概念是否匹配
                        for (const concept of coreConcepts) {
                            if (dm.news.includes(concept)) {
                                const matched = newsAnalysisList.find(na => na.news_title === dm.news);
                                if (matched) return matched;
                            }
                        }
                    }
                }
                
                return null;
            }

            // S级
            if (data.s_level && data.s_level.length) {
                html += `
                    <div class="section news-section s-level">
                        <div class="section-title">🔴 S级（结构性叙事，影响1-4周）</div>`;
                data.s_level.forEach(item => {
                    html += renderNewsCard(item);
                    const bayes = item.bayes_analysis || findBayesForNews(item.title, bj?.news_analysis, bj?.decision_matrix);
                    if (bayes) {
                        html += renderNewsBayesAnalysis(item.title, bayes);
                    }
                });
                html += '</div>';
            }

            // A级
            if (data.a_level && data.a_level.length) {
                html += `
                    <div class="section news-section a-level">
                        <div class="section-title">🟡 A级（阶段性叙事，影响1-3天）</div>`;
                data.a_level.forEach(item => {
                    html += renderNewsCard(item);
                    const bayes = item.bayes_analysis || findBayesForNews(item.title, bj?.news_analysis, bj?.decision_matrix);
                    if (bayes) {
                        html += renderNewsBayesAnalysis(item.title, bayes);
                    }
                });
                html += '</div>';
            }

            // 抖音/平台
            if (data.douyin && data.douyin.length) {
                html += `
                    <div class="section news-section douyin">
                        <div class="section-title">📱 抖音/平台相关</div>`;
                data.douyin.forEach(item => {
                    html += renderNewsCard(item);
                    const bayes = item.bayes_analysis || findBayesForNews(item.title, bj?.news_analysis, bj?.decision_matrix);
                    if (bayes) {
                        html += renderNewsBayesAnalysis(item.title, bayes);
                    }
                });
                html += '</div>';
            }

            document.getElementById('content').innerHTML = html;
        }

        // 初始化
        initNav();
        updateUI();
    </script>
</body>
</html>
